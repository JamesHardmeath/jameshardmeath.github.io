<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>markin.hu — Mai döntés</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --ink: #0d1b2a;
    --ink-soft: #1b263b;
    --paper: #f5f1e8;
    --paper-warm: #ede6d3;
    --rule: #d4cdb8;
    --accent: #8b3a3a;
    --accent-soft: #b8857a;
    --positive: #2d5a3d;
    --negative: #8b3a3a;
    --muted: #6b6456;
    --highlight: #e8d59f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139, 58, 58, 0.03), transparent 50%),
      radial-gradient(circle at 80% 60%, rgba(13, 27, 42, 0.04), transparent 50%);
    min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01"; }
  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

  /* Header */
  header.site-header {
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    padding: 20px 0;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
    background: rgba(245, 241, 232, 0.92);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand-dot { color: var(--accent); }
  .brand-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 500;
  }
  .lang-toggle {
    display: flex;
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    font-size: 13px;
    font-weight: 500;
  }
  .lang-toggle button {
    background: transparent;
    border: none;
    padding: 6px 14px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    font-family: inherit;
  }
  .lang-toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }
  .lang-toggle button:hover:not(.active) { background: var(--paper-warm); color: var(--ink); }

  /* Hero */
  .hero {
    padding: 64px 0 48px;
    border-bottom: 1px solid var(--rule);
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 48px;
    align-items: start;
  }
  @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 24px; } }
  .hero-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .hero-headline em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .hero-lede {
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 540px;
  }
  .hero-meta {
    border-left: 2px solid var(--accent);
    padding: 4px 0 4px 18px;
    font-size: 13px;
  }
  .hero-meta-label {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 11px;
  }
  .hero-meta-value { color: var(--ink); margin-bottom: 14px; line-height: 1.5; }
  .hero-meta-value:last-child { margin-bottom: 0; }

  /* Form */
  .form-section {
    padding: 56px 0;
    border-bottom: 1px solid var(--rule);
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .section-intro {
    color: var(--muted);
    margin-bottom: 32px;
    max-width: 640px;
    font-size: 15px;
  }
  .form-card {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 32px;
    box-shadow: 0 1px 0 rgba(13, 27, 42, 0.04);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px 24px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }
  .field-hint { font-size: 12px; color: var(--muted); font-style: italic; }
  .field input, .field select {
    padding: 10px 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .field input.mono, .field select.mono { font-family: 'JetBrains Mono', monospace; }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(13, 27, 42, 0.08);
  }
  .field-checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
  }
  .field-checkbox input { width: 18px; height: 18px; accent-color: var(--ink); }
  .field-checkbox label { font-size: 14px; color: var(--ink); cursor: pointer; }

  .optional-toggle {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px dashed var(--rule);
  }
  .toggle-button {
    background: none;
    border: none;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-button:hover { color: var(--ink); }
  .toggle-icon { display: inline-block; transition: transform 0.2s; }
  .toggle-icon.open { transform: rotate(90deg); }
  .optional-content {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }

  .submit-row {
    margin-top: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .submit-button {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 32px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .submit-button:hover { background: var(--accent); transform: translateY(-1px); }
  .submit-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .submit-note { font-size: 13px; color: var(--muted); font-style: italic; }

  .validation-error {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(139, 58, 58, 0.08);
    border-left: 3px solid var(--accent);
    color: var(--accent);
    font-size: 13px;
  }

  /* Results */
  .results-section { padding: 56px 0; border-bottom: 1px solid var(--rule); }
  .results-block { margin-bottom: 48px; }
  .results-block:last-child { margin-bottom: 0; }
  .block-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .block-title {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.015em;
  }
  .block-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Inputs restated table */
  .restated-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    padding: 24px;
  }
  .restated-item { display: flex; flex-direction: column; gap: 4px; }
  .restated-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
  }
  .restated-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--ink);
    font-weight: 500;
  }

  /* Market snapshot */
  .market-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
  }
  .market-table tr { border-bottom: 1px solid var(--rule); }
  .market-table tr:last-child { border-bottom: none; }
  .market-table td { padding: 12px 16px; vertical-align: top; }
  .market-table td:first-child { color: var(--ink-soft); width: 50%; }
  .market-table td:last-child { font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 500; }
  .market-table .source { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }

  /* Module cards */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 16px;
  }
  .module-card {
    background: rgba(255, 255, 255, 0.65);
    border: 1px solid var(--rule);
    padding: 20px 22px;
    transition: all 0.2s;
    position: relative;
  }
  .module-card.ineligible { opacity: 0.55; background: rgba(0, 0, 0, 0.02); }
  .module-card.penalty { border-left: 3px solid var(--accent); background: rgba(139, 58, 58, 0.03); }
  .module-card.wait { border-left: 3px solid var(--highlight); }
  .module-card.top-pick { border: 2px solid var(--ink); background: var(--paper); }
  .module-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }
  .module-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .module-name {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .module-subtitle { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 14px; }
  .module-status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 12px;
  }
  .status-eligible { background: rgba(45, 90, 61, 0.1); color: var(--positive); }
  .status-ineligible { background: rgba(139, 58, 58, 0.1); color: var(--accent); }
  .status-warning { background: rgba(232, 213, 159, 0.4); color: #8a6b1e; }
  .status-penalty { background: rgba(139, 58, 58, 0.15); color: var(--accent); }
  .module-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 13px;
  }
  .module-row:last-of-type { border-bottom: none; }
  .module-row-label { color: var(--ink-soft); font-weight: 500; }
  .module-row-value { font-family: 'JetBrains Mono', monospace; text-align: right; color: var(--ink); }
  .module-row-value.positive { color: var(--positive); font-weight: 600; }
  .module-row-value.negative { color: var(--negative); font-weight: 600; }
  .module-risks {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .module-risks-label { font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .module-risks ul { list-style: none; padding: 0; }
  .module-risks li { padding: 2px 0; padding-left: 12px; position: relative; }
  .module-risks li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .module-assumptions {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.02);
    border-left: 2px solid var(--rule);
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
  }

  /* Tabs */
  .tabs-bar {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tab-button {
    background: none;
    border: none;
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tab-button:hover { color: var(--ink); }
  .tab-button.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab-instruction {
    background: rgba(232, 213, 159, 0.25);
    border-left: 3px solid var(--highlight);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    font-style: italic;
  }

  /* Comparison table */
  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
  }
  .comparison-table thead { background: var(--ink); color: var(--paper); }
  .comparison-table th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .comparison-table th.num, .comparison-table td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .comparison-table tr { border-bottom: 1px solid var(--rule); }
  .comparison-table tr:hover { background: rgba(0, 0, 0, 0.02); }
  .comparison-table tbody tr:last-child { border-bottom: none; }
  .comparison-table td { padding: 11px 16px; }
  .rank-cell {
    width: 32px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 12px;
  }

  /* Narrowing section */
  .narrowing-card {
    background: var(--ink);
    color: var(--paper);
    padding: 32px;
    border-radius: 2px;
  }
  .narrowing-card .section-label { color: var(--highlight); }
  .narrowing-card .section-label::before { background: var(--highlight); }
  .narrowing-card .block-title { color: var(--paper); }
  .narrowing-text {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    line-height: 1.5;
    color: rgba(245, 241, 232, 0.92);
    margin-bottom: 20px;
  }
  .narrowing-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .narrowing-option {
    background: rgba(245, 241, 232, 0.08);
    border-left: 2px solid var(--highlight);
    padding: 14px 18px;
  }
  .narrowing-option-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--highlight);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .narrowing-option-name {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    color: var(--paper);
    margin-bottom: 4px;
  }
  .narrowing-option-detail { font-size: 12px; color: rgba(245, 241, 232, 0.7); }

  /* Execution */
  .execution-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }
  .execution-card {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    padding: 22px;
  }
  .execution-card-header {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    margin-bottom: 12px;
    color: var(--ink);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .provider-row {
    padding: 12px 0;
    border-bottom: 1px dotted var(--rule);
  }
  .provider-row:last-child { border-bottom: none; }
  .provider-name {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    font-size: 14px;
  }
  .provider-use { font-size: 12px; color: var(--muted); font-style: italic; }
  .provider-tag {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    background: var(--paper-warm);
    border-radius: 2px;
    margin-right: 6px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .provider-tag.existing { background: var(--ink); color: var(--paper); }

  /* Validation questions */
  .questions-list {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    padding: 24px 28px;
  }
  .questions-list ol { list-style: none; counter-reset: q; padding: 0; }
  .questions-list li {
    counter-increment: q;
    padding: 14px 0 14px 50px;
    position: relative;
    border-bottom: 1px solid var(--rule);
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink-soft);
  }
  .questions-list li:last-child { border-bottom: none; }
  .questions-list li::before {
    content: counter(q, decimal-leading-zero);
    position: absolute;
    left: 0;
    top: 14px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
  }

  /* JSON capture */
  .json-block {
    background: var(--ink);
    color: var(--paper);
    padding: 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    border-radius: 2px;
    max-height: 400px;
    overflow-y: auto;
  }
  .json-toggle {
    background: var(--ink-soft);
    color: var(--paper);
    border: none;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    font-weight: 600;
  }

  /* Disclaimer */
  .disclaimer-bar {
    background: var(--ink);
    color: rgba(245, 241, 232, 0.85);
    padding: 24px 0;
    font-size: 13px;
    line-height: 1.6;
  }
  .disclaimer-bar strong { color: var(--paper); }
  .disclaimer-bar a { color: var(--highlight); text-decoration: underline; }

  footer.site-footer {
    background: var(--ink);
    color: rgba(245, 241, 232, 0.7);
    padding: 32px 0;
    font-size: 12px;
    text-align: center;
  }
  footer.site-footer .footer-brand {
    font-family: 'Fraunces', serif;
    color: var(--paper);
    margin-bottom: 4px;
    font-size: 14px;
  }

  /* Currency exposure visualization */
  .fx-bar {
    display: flex;
    height: 8px;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
    border: 1px solid var(--rule);
  }
  .fx-segment-huf { background: var(--accent); }
  .fx-segment-eur { background: var(--ink-soft); }
  .fx-segment-usd { background: var(--highlight); }
  .fx-legend { display: flex; gap: 12px; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .fx-legend-item { display: flex; align-items: center; gap: 4px; }
  .fx-swatch { width: 8px; height: 8px; border-radius: 1px; }

  /* Loading */
  .computing {
    text-align: center;
    padding: 64px 24px;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>

// =========================================================================
// HELPER FUNCTIONS
// =========================================================================
function fmtHuf(n, lang) {
  if (n == null || isNaN(n)) return "—";
  const formatter = new Intl.NumberFormat('hu-HU', { maximumFractionDigits: 0 });
  return formatter.format(Math.round(n)) + " Ft";
}
function fmtPct(n, lang, digits = 2) {
  if (n == null || isNaN(n)) return "—";
  const v = (n * 100).toFixed(digits);
  return lang === 'hu' ? v.replace('.', ',') + " %" : v + "%";
}
function fmtNum(n, lang, digits = 0) {
  if (n == null || isNaN(n)) return "—";
  const v = n.toFixed(digits);
  return lang === 'hu' ? v.replace('.', ',') : v;
}
function convertToHuf(amount, currency) {
  if (currency === "HUF") return amount;
  if (currency === "EUR") return amount * MARKET_STATE.fxHufEur;
  if (currency === "USD") return amount * MARKET_STATE.fxHufUsd;
  return amount;
}

// TBSZ tax bracket — gyűjtőév-based (Vadim's correction from review)
// Deposits in calendar year N constitute gyűjtőév N.
// Tax bracket transitions occur at end of N+3 (10% bracket) and end of N+5 (0%).
// For modeling purposes, given horizon_years from "today":
// - if horizon < ~3 years from end of current year: 28%
// - if 3-5 years: 10%
// - if 5+ years: 0%
// Refined: we model as if today is mid-year and the gyűjtőév is current calendar year.
function tbszTaxRate(horizonYears) {
  // Conservative approximation: time until end-of-year ~0.5y, then 3y to 10%, 5y to 0%
  const effectiveYearsFromGyujtoevEnd = horizonYears - 0.5;
  if (effectiveYearsFromGyujtoevEnd >= 5) return 0;
  if (effectiveYearsFromGyujtoevEnd >= 3) return 0.10;
  return 0.28;
}

// =========================================================================
// ENGINE — calculate each module
// =========================================================================
function calculateModule(moduleId, inputs) {
  const amountHuf = convertToHuf(inputs.amount, inputs.currency);
  const h = inputs.horizon_years;

  switch (moduleId) {
    case "tbsz_vwce": {
      const ineligible = inputs.tax_residency !== "HU";
      if (ineligible) return { eligible: false, reason_hu: "Nem magyar adóügyi illetőség", reason_en: "Non-HU tax residency" };

      const warning = h < 3;
      const nominalReturn = 0.0628; // 6.5% - 0.22% TER
      const grossValue = amountHuf * Math.pow(1 + nominalReturn, h);
      const grossGain = grossValue - amountHuf;
      const taxRate = tbszTaxRate(h);
      const tax = Math.max(0, grossGain * taxRate);
      const fee = amountHuf * 0.0035; // assumed Lightyear baseline
      const netValue = grossValue - tax - fee;
      const lowGain = amountHuf * Math.pow(1 + 0.04, h) - amountHuf;
      const highGain = amountHuf * Math.pow(1 + 0.09, h) - amountHuf;
      const lowNet = amountHuf + lowGain * (1 - taxRate) - fee;
      const highNet = amountHuf + highGain * (1 - taxRate) - fee;

      return {
        eligible: true,
        warning: warning,
        warning_hu: warning ? "3 évnél rövidebb tartás esetén a teljes 28% adó alkalmazandó" : null,
        warning_en: warning ? "Holding under 3 years incurs full 28% tax on gains" : null,
        netValue, lowNet, highNet,
        taxRate, tax,
        netReturnPct: netValue / amountHuf - 1,
        annualizedReturn: Math.pow(netValue / amountHuf, 1 / h) - 1,
        liquidity: taxRate === 0 ? 3 : 2,
        fxExposure: { huf: 0, eur: 0, usd: 100 },
        riskRating: 4,
        risks_hu: ["Részvénypiaci volatilitás (~15–18% éves)", "USD/HUF árfolyamkockázat (5y: ±15%)", "TBSZ futamidő előtti kilépés adóhátrányt jelent"],
        risks_en: ["Equity volatility (~15-18% annual)", "USD/HUF FX risk (5y: ±15%)", "Pre-maturity TBSZ exit incurs full tax"],
        assumptions_hu: `Várható éves hozam (EUR): 6,5% (range 4,0–9,0%) | TER: 0,22% | Adósáv: ${(taxRate*100).toFixed(0)}% | Bróker díj: ~0,35% | FX: HUF/USD konstansnak modellezve | Volatilitás: ±15% range`,
        assumptions_en: `Expected return (EUR): 6.5% (range 4.0-9.0%) | TER: 0.22% | Tax bracket: ${(taxRate*100).toFixed(0)}% | Broker fee: ~0.35% | FX: HUF/USD modeled constant | Volatility: ±15% range`,
      };
    }

    case "tbsz_aggh": {
      const ineligible = inputs.tax_residency !== "HU";
      if (ineligible) return { eligible: false, reason_hu: "Nem magyar adóügyi illetőség", reason_en: "Non-HU tax residency" };

        eligible: true,
        penalty: true,
        netValue,
        lowNet: netValue,
        highNet: netValue,
        taxRate: 0.28,
        tax,
        netReturnPct: netValue / amountHuf - 1,
        annualizedReturn: Math.pow(netValue / amountHuf, 1 / h) - 1,
        liquidity: 5,
        fxExposure: { huf: 100, eur: 0, usd: 0 },
        riskRating: 1,
        risks_hu: ["Inflációs kockázat (negatív reálkamat tartomány)", "Elszalasztott opportunity-cost vs ÁKK", "Bankspecifikus kockázat (OBA-on felül)"],
        risks_en: ["Inflation risk (negative real rate territory)", "Opportunity cost vs ÁKK", "Bank-specific risk (above OBA)"],
        assumptions_hu: `Sztenderd (nem akciós) HUF betéti kamat: 2,0% | Adó: 28% | Cél: bemutatni az opportunity cost-ot a FixMÁP-hoz képest`,
        assumptions_en: `Standard (non-promotional) HUF deposit rate: 2.0% | Tax: 28% | Purpose: show opportunity cost vs FixMÁP`,
      };
    }

    default:
      return { eligible: false, reason_hu: "Ismeretlen modul", reason_en: "Unknown module" };
  }
}

// =========================================================================
// COMPARISON VIEW GENERATORS
// =========================================================================
function sortByReturn(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => b.netValue - a.netValue);
}
function sortByLiquidity(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => b.liquidity - a.liquidity);
}
function sortByTax(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => a.taxRate - b.taxRate);
}
function sortByRisk(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => a.riskRating - b.riskRating);
}

// Narrowing logic (Section 11 step 7)
function generateNarrowing(results, lang, inputs) {
  const eligible = results.filter(r => r.eligible && !r.penalty && r.id !== "wait");
  const byReturn = [...eligible].sort((a, b) => b.netValue - a.netValue);
  const top3 = byReturn.slice(0, 3);

  return top3;
}

// Validation questions generator
function generateValidationQuestions(narrowing, inputs, lang) {
  const questions = [];
  const topIds = narrowing.map(n => n.id);

  if (topIds.includes("tbsz_vwce") || topIds.includes("p1_no_tbsz")) {
    questions.push(lang === 'hu'
      ? "Komfortos vagy USD-kitettséggel a teljes időtávon? Egy 30%-os USD-leértékelődés a HUF-fal szemben hogyan érintene?"
      : "Are you comfortable with full USD exposure over the horizon? How would a 30% USD depreciation vs HUF affect you?");
  }
  if (topIds.includes("emap") || topIds.includes("tbsz_aggh")) {
    questions.push(lang === 'hu'
      ? "Komfortos vagy EUR-kitettséggel? Az EUR-os instrumentumok hozamát az EUR/HUF árfolyam határozza meg a kifizetéskor."
      : "Are you comfortable with EUR exposure? EUR-denominated returns are determined by EUR/HUF rate at exit.");
  }
  if (topIds.includes("fixmap") || topIds.includes("map_plus") || topIds.includes("pmap")) {
    questions.push(lang === 'hu'
      ? "Hozzáférhetsz-e ehhez a pénzhez az időtávon belül, ha bármi történik? Az állampapírok 1% büntetéssel kiválthatók, de ez egy hozamveszteség."
      : "Could you access this money during the horizon if something happens? Government bonds can be exited at 1% penalty, but that's a yield loss.");
  }
  if (inputs.horizon_years < 3 && topIds.includes("tbsz_vwce")) {
    questions.push(lang === 'hu'
      ? "Tényleg legalább 5 évig nem nyúlsz hozzá? A TBSZ legnagyobb előnye (0% adó) csak 5 év után aktiválódik."
      : "Will you really not touch this for at least 5 years? TBSZ's biggest benefit (0% tax) only activates after 5 years.");
  }
  questions.push(lang === 'hu'
    ? "Megrendülne-e az anyagi helyzeted egy 30%-os veszteség esetén az időtáv elején? (Részvénypiacok történelmileg ezt produkálják 1-szer egy évtizedben.)"
    : "Would a 30% loss early in the horizon shake your financial position? (Equity markets historically do this once per decade.)");
  questions.push(lang === 'hu'
    ? "Az időtáv reális? Életesemények (lakásvásárlás, gyermek, álláskeresés) megváltoztathatják a likviditási igényt."
    : "Is the horizon realistic? Life events (home purchase, child, job change) can change liquidity needs.");

  return questions.slice(0, 5);
}

                    inputs: results.inputs,
                    marketState: results.marketState,
                    modules: results.modules.map(m => ({
                      id: m.id,
                      eligible: m.eligible,
                      netValue: m.netValue,
                      taxRate: m.taxRate,
                      tax: m.tax,
                      annualizedReturn: m.annualizedReturn,
                      liquidity: m.liquidity,
                      riskRating: m.riskRating,
                      fxExposure: m.fxExposure,
                      reason: m.eligible ? null : m['reason_' + lang],
                    })),
                    narrowing: results.narrowing.map(n => n.id),
                    timestamp: results.timestamp,
                  }, null, 2)}
                </pre>
              )}
            </div>

          </div>
        </section>
      )}

      {/* Disclaimer */}
      <div className="disclaimer-bar">
        <div className="container">
          <strong>{t.disclaimerStrong}</strong> {t.disclaimer}
        </div>
      </div>

      <footer className="site-footer">
        <div className="container">
          <div className="footer-brand">markin.hu</div>
          <div>{t.footer}</div>
        </div>
      </footer>
    </>
  );
}

// =========================================================================
// SUB-COMPONENTS
// =========================================================================
function ModuleCard({ mod, lang, t, inputs }) {
  const name = mod['name_' + lang];
  const sub = mod['sub_' + lang];

  if (!mod.eligible) {
    return (
      <div className="module-card ineligible">
        <div className="module-header">
          <div>
            <div className="module-num">{mod.num}</div>
            <div className="module-name">{name}</div>
          </div>
        </div>
        <div className="module-subtitle">{sub}</div>
        <span className="module-status status-ineligible">{t.eligibilityNo}</span>
        <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>
          {mod['reason_' + lang]}
        </div>
      </div>
    );
  }

  const isWait = mod.id === "wait";
  const isPenalty = mod.penalty;

  return (
    <div className={`module-card ${isWait ? 'wait' : ''} ${isPenalty ? 'penalty' : ''}`}>
      <div className="module-header">
        <div>
          <div className="module-num">{mod.num}</div>
          <div className="module-name">{name}</div>
        </div>
      </div>
      <div className="module-subtitle">{sub}</div>
      <span className={`module-status ${mod.warning ? 'status-warning' : isPenalty ? 'status-penalty' : 'status-eligible'}`}>
        {mod.warning ? t.eligibilityWarning : isPenalty ? t.eligibilityRef : t.eligibilityYes}
      </span>
      {mod.warning && mod['warning_' + lang] && (
        <div style={{ fontSize: 12, color: '#8a6b1e', marginBottom: 8, fontStyle: 'italic' }}>
          ⚠ {mod['warning_' + lang]}
        </div>
      )}

      <div className="module-row">
        <span className="module-row-label">{t.netValue}</span>
        <span className="module-row-value positive">{fmtHuf(mod.netValue, lang)}</span>
      </div>
      {mod.lowNet !== mod.highNet && (
        <div className="module-row">
          <span className="module-row-label">{lang === 'hu' ? 'Tartomány (alacsony / magas)' : 'Range (low / high)'}</span>
          <span className="module-row-value">{fmtHuf(mod.lowNet, lang)} / {fmtHuf(mod.highNet, lang)}</span>
        </div>
      )}
      <div className="module-row">
        <span className="module-row-label">{lang === 'hu' ? 'Éves nettó hozam' : 'Annualized net return'}</span>
        <span className="module-row-value">{fmtPct(mod.annualizedReturn, lang)}</span>
      </div>
      <div className="module-row">
        <span className="module-row-label">{t.taxOwed}</span>
        <span className="module-row-value">{fmtHuf(mod.tax, lang)} ({fmtPct(mod.taxRate, lang, 0)})</span>
      </div>
      <div className="module-row">
        <span className="module-row-label">{t.liquidity}</span>
        <span className="module-row-value">{t['liq' + mod.liquidity]}</span>
      </div>
      <div className="module-row">
        <span className="module-row-label">{t.riskRating}</span>
        <span className="module-row-value">{t['risk' + mod.riskRating]}</span>
      </div>

      <div className="module-row" style={{ alignItems: 'flex-start' }}>
        <span className="module-row-label">{t.fxExposure}</span>
        <div style={{ flex: 1, marginLeft: 'auto', maxWidth: 160 }}>
          <div className="fx-bar">
            {mod.fxExposure.huf > 0 && <div className="fx-segment-huf" style={{ width: `${mod.fxExposure.huf}%` }} />}
            {mod.fxExposure.eur > 0 && <div className="fx-segment-eur" style={{ width: `${mod.fxExposure.eur}%` }} />}
            {mod.fxExposure.usd > 0 && <div className="fx-segment-usd" style={{ width: `${mod.fxExposure.usd}%` }} />}
          </div>
          <div className="fx-legend">
            {mod.fxExposure.huf > 0 && <span className="fx-legend-item"><span className="fx-swatch fx-segment-huf"></span>HUF {mod.fxExposure.huf}%</span>}
            {mod.fxExposure.eur > 0 && <span className="fx-legend-item"><span className="fx-swatch fx-segment-eur"></span>EUR {mod.fxExposure.eur}%</span>}
            {mod.fxExposure.usd > 0 && <span className="fx-legend-item"><span className="fx-swatch fx-segment-usd"></span>USD {mod.fxExposure.usd}%</span>}
          </div>
        </div>
      </div>

      {mod['risks_' + lang] && (
        <div className="module-risks">
          <div className="module-risks-label">{t.topRisks}</div>
          <ul>
            {mod['risks_' + lang].map((r, i) => <li key={i}>{r}</li>)}
          </ul>
        </div>
      )}

      {mod['assumptions_' + lang] && (
        <div className="module-assumptions">
          <strong>{t.assumptions}:</strong> {mod['assumptions_' + lang]}
        </div>
      )}
    </div>
  );
}

function ComparisonTable({ rows, type, lang, t }) {
  if (rows.length === 0) {
    return <div style={{ padding: 24, fontStyle: 'italic', color: 'var(--muted)' }}>
      {lang === 'hu' ? 'Nincs választható opció ehhez a nézethez.' : 'No eligible options for this view.'}
    </div>;
  }

  if (type === "return") {
    return (
      <table className="comparison-table">
        <thead><tr>
          <th className="rank-cell">#</th>
          <th>{t.tableHeaderModule}</th>
          <th className="num">{t.tableHeaderValue}</th>
          <th className="num">{t.tableHeaderReturn}</th>
          <th className="num">{t.tableHeaderRange}</th>
        </tr></thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={r.id}>
              <td className="rank-cell">{String(i + 1).padStart(2, '0')}</td>
              <td>{r['name_' + lang]}</td>
              <td className="num">{fmtHuf(r.netValue, lang)}</td>
              <td className="num">{fmtPct(r.annualizedReturn, lang)}</td>
              <td className="num">{fmtHuf(r.lowNet, lang)} – {fmtHuf(r.highNet, lang)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    );
  }
  if (type === "liquidity") {
    const liqLabels = { 5: lang === 'hu' ? 'Azonnali' : 'Instant', 4: lang === 'hu' ? 'T+1, ≤1%' : 'T+1, ≤1%', 3: lang === 'hu' ? 'T+2, adóköteles' : 'T+2, taxable', 2: lang === 'hu' ? 'Adós kilépés' : 'Tax exit', 1: lang === 'hu' ? 'Lekötött' : 'Locked' };
    return (
      <table className="comparison-table">
        <thead><tr>
          <th className="rank-cell">#</th>
          <th>{t.tableHeaderModule}</th>
          <th className="num">{t.tableHeaderRating}</th>
          <th>{t.tableHeaderExit}</th>
        </tr></thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={r.id}>
              <td className="rank-cell">{String(i + 1).padStart(2, '0')}</td>
              <td>{r['name_' + lang]}</td>
              <td className="num">{r.liquidity}/5</td>
              <td>{liqLabels[r.liquidity]}</td>
            </tr>
          ))}
        </tbody>
      </table>
    );
  }
  if (type === "tax") {
    return (
      <table className="comparison-table">
        <thead><tr>
          <th className="rank-cell">#</th>
          <th>{t.tableHeaderModule}</th>
          <th className="num">{t.tableHeaderTaxRate}</th>
          <th className="num">{t.tableHeaderTaxOwed}</th>
        </tr></thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={r.id}>
              <td className="rank-cell">{String(i + 1).padStart(2, '0')}</td>
              <td>{r['name_' + lang]}</td>
              <td className="num">{fmtPct(r.taxRate, lang, 0)}</td>
              <td className="num">{fmtHuf(r.tax, lang)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    );
  }
  if (type === "risk") {
    return (
      <table className="comparison-table">
        <thead><tr>
          <th className="rank-cell">#</th>
          <th>{t.tableHeaderModule}</th>
          <th className="num">{t.tableHeaderRating}</th>
          <th>{lang === 'hu' ? 'Jellemzés' : 'Description'}</th>
        </tr></thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={r.id}>
              <td className="rank-cell">{String(i + 1).padStart(2, '0')}</td>
              <td>{r['name_' + lang]}</td>
              <td className="num">{r.riskRating}/5</td>
              <td>{t['risk' + r.riskRating]}</td>
            </tr>
          ))}
        </tbody>
      </table>
    );
  }
  return null;
}

function ExecutionLayer({ narrowing, inputs, lang }) {
  // Per Section 14, surface 2-3 providers for each of the top modules
  return (
    <div className="execution-grid">
      {narrowing.map(n => {
        let providers = [];
        if (n.id === "tbsz_vwce" || n.id === "tbsz_aggh") {
          if (inputs.existing_tbsz_open !== "none") {
            providers = [
              { name: lang === 'hu' ? 'Meglévő TBSZ folytatása' : 'Continue existing TBSZ', tag: 'existing', use: lang === 'hu' ? 'Nincs új számlanyitás. A gyűjtőév-számláló folytatódik.' : 'No new account opening. Gyűjtőév clock continues.' },
              { name: 'Lightyear', tag: 'low-friction', use: lang === 'hu' ? 'Alacsony belépési küszöb VWCE-re. 0% kereskedési díj, 0,35% FX.' : 'Low-friction VWCE entry. 0% trade fee, 0.35% FX.' },
            ];
          } else if (inputs.friction_preference === "low") {
            providers = [
              { name: 'Lightyear', tag: 'primary', use: lang === 'hu' ? 'App-alapú, ingyenes TBSZ, 0% díj VWCE-re. Minimum 25 000 Ft.' : 'App-based, free TBSZ, 0% fee on VWCE. Min 25,000 HUF.' },
              { name: 'Erste Invest', tag: 'alternative', use: lang === 'hu' ? 'Banki integráció, automatikus NAV-bevallás. Magasabb díj.' : 'Bank integration, auto NAV declaration. Higher fees.' },
            ];
          } else if (inputs.friction_preference === "high_ok") {
            providers = [
              { name: 'Interactive Brokers', tag: 'primary', use: lang === 'hu' ? 'Legolcsóbb díjak, legszélesebb termékkör. Magasabb KYC.' : 'Cheapest fees overall, broadest universe. Heavier KYC.' },
              { name: 'Lightyear', tag: 'alternative', use: lang === 'hu' ? 'Egyszerűbb belépés, ha IBKR onboarding elakad.' : 'Simpler entry if IBKR onboarding stalls.' },
            ];
          } else {
            providers = [
              { name: 'Erste Invest', tag: 'primary', use: lang === 'hu' ? 'Banki integráció, automatikus NAV-bevallás.' : 'Bank integration, auto NAV declaration.' },
              { name: 'Lightyear', tag: 'alternative', use: lang === 'hu' ? 'Alacsonyabb díjak, app-alapú.' : 'Lower fees, app-based.' },
              { name: 'Interactive Brokers', tag: 'alternative', use: lang === 'hu' ? 'Legolcsóbb skálán, komplexebb belépés.' : 'Cheapest at scale, more complex onboarding.' },
            ];
          }
        } else if (["fixmap", "pmap", "map_plus", "bmap", "dkj", "emap"].includes(n.id)) {
          providers = [
            { name: 'WebKincstár', tag: 'primary', use: lang === 'hu' ? 'Államkincstár-direkt, online, díjmentes.' : 'Government-direct, online, fee-free.' },
            { name: lang === 'hu' ? 'Bank (Erste/K&H/OTP)' : 'Bank (Erste/K&H/OTP)', tag: 'alternative', use: lang === 'hu' ? 'Kényelmes, ha már van banki kapcsolat. ~0,5% díj.' : 'Convenient if user already banks here. ~0.5% fee.' },
            { name: 'Magyar Posta', tag: 'alternative', use: lang === 'hu' ? 'Személyes ügyintézés.' : 'In-person option.' },
          ];
        } else if (n.id === "babakotveny") {
          providers = [
            { name: 'WebKincstár / Államkincstár', tag: 'primary', use: lang === 'hu' ? 'Babakötvény-számla a Kincstárnál (Start-számla).' : 'Babakötvény account at Kincstár (Start-account).' },
          ];
        } else if (n.id === "huf_cash") {
          providers = [
            { name: lang === 'hu' ? 'Bankmonitor-szűrés' : 'Bankmonitor filter', tag: 'primary', use: lang === 'hu' ? 'Aktuális legjobb HUF betéti kamatok. Akciós feltételek figyelendők.' : 'Current best HUF deposit rates. Watch promo conditions.' },
          ];
        } else if (n.id === "fx_cash") {
          providers = [
            { name: 'Wise', tag: 'primary', use: lang === 'hu' ? 'Legjobb multi-devizás UX, szűk FX-spread.' : 'Best multi-currency UX, tight FX spread.' },
            { name: 'Lightyear (általános számla)', tag: 'alternative', use: lang === 'hu' ? 'Jelenleg legmagasabb USD-kamat.' : 'Highest USD rate currently observed.' },
            { name: 'IBKR uninvested cash', tag: 'alternative', use: lang === 'hu' ? 'Interbank FX, nagyobb tételeknél előnyös.' : 'Interbank FX, advantageous at scale.' },
          ];
        } else if (n.id === "nyesz") {
          providers = [
            { name: 'Erste / K&H / OTP', tag: 'primary', use: lang === 'hu' ? 'Banki NYESZ, banki portfólió-kínálattal.' : 'Bank-channel NYESZ with bank portfolio range.' },
            { name: 'Concorde / Equilor', tag: 'alternative', use: lang === 'hu' ? 'Bróker NYESZ, szélesebb befektetési választék.' : 'Broker NYESZ, broader investment selection.' },
          ];
        } else if (n.id === "wait") {
          providers = [
            { name: lang === 'hu' ? 'Folyószámla / azonnali megtakarítás' : 'Current / instant savings', tag: 'primary', use: lang === 'hu' ? 'Tartsd meglévő számlán, várj új információra.' : 'Hold in current account, await new information.' },
          ];
        }

        return (
          <div key={n.id} className="execution-card">
            <div className="execution-card-header">{n['name_' + lang]}</div>
            {providers.map((p, i) => (
              <div key={i} className="provider-row">
                <div className="provider-name">
                  <span className={`provider-tag ${p.tag === 'existing' ? 'existing' : ''}`}>{p.tag}</span>
                  {p.name}
                </div>
                <div className="provider-use">{p.use}</div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
