                  ? 'A cockpit fent csak a döntéshez szükséges rövidlistát mutatja. Itt látszik minden vizsgált opció, beleértve a kieső vagy preferencia miatt hátrébb sorolt utakat is.'
                  : 'The cockpit above shows only the decision shortlist. This is the full audit trail: every checked option, including routes excluded or deprioritized by your constraints.'}
              </p>
              <div className="modules-grid">
                {results.modules.filter(m => !m.penalty).slice().sort((a, b) => {
                  // Eligible first (by netValue desc), then ineligible
                  if (a.eligible && !b.eligible) return -1;
                  if (!a.eligible && b.eligible) return 1;
                  if (!a.eligible && !b.eligible) return 0;
                  return (b.netValue || 0) - (a.netValue || 0);
                }).map(m => {
                  const rankIndex = results.narrowing.findIndex(n => n.id === m.id);
                  const rank = rankIndex === -1 ? null : rankIndex + 1;
                  return (
                    <ModuleCard
                      key={m.id}
                      mod={m}
                      lang={lang}
                      t={t}
                      inputs={results.inputs}
                      rank={rank}
                      onTermClick={toggleTerm}
                      openTerms={openTerms}
                      onSelect={() => selectExecModule(m.id)}
                      isSelected={selectedExecModule === m.id}
                    />
                  );
                })}
              </div>

              {/* Execution detail panel — appears below the grid when a module is selected */}
              {selectedExecModule && EXEC_STEPS[selectedExecModule] && (
                <div ref={execDetailRef}>
                  <ExecDetailCard
                    moduleId={selectedExecModule}
                    lang={lang}
                    t={t}
                    onClose={() => setSelectedExecModule(null)}
                    moduleData={results.modules.find(m => m.id === selectedExecModule)}
                    inputs={results.inputs}
                  />
                </div>
              )}
            </div>

            {/* 7.4 Penalty modules */}
            <div className="results-block">
              <div className="block-header">
                <h2 className="block-title">{t.penalties}</h2>
                <div className="block-num">7.4</div>
              </div>
              <p className="section-intro">{t.penaltiesIntro}</p>
              <div className="modules-grid">
                {results.modules.filter(m => m.penalty).map(m => (
                  <ModuleCard
                    key={m.id}
                    mod={m}
                    lang={lang}
                    t={t}
                    inputs={results.inputs}
                    rank={null}
                    onTermClick={toggleTerm}
                    openTerms={openTerms}
                    onSelect={null}
                    isSelected={false}
                  />
                ))}
              </div>
            </div>

            {/* 7.5 Four views */}
            <div className="results-block">
              <div className="block-header">
                <h2 className="block-title">{t.fourViews}</h2>
                <div className="block-num">7.5</div>
              </div>
              <p className="section-intro">{t.fourViewsIntro}</p>
              <div className="tabs-bar">
                <button className={`tab-button ${activeTab === 'return' ? 'active' : ''}`} onClick={() => setActiveTab('return')}>{t.viewByReturn}</button>
                <button className={`tab-button ${activeTab === 'liquidity' ? 'active' : ''}`} onClick={() => setActiveTab('liquidity')}>{t.viewByLiquidity}</button>
                <button className={`tab-button ${activeTab === 'tax' ? 'active' : ''}`} onClick={() => setActiveTab('tax')}>{t.viewByTax}</button>
                <button className={`tab-button ${activeTab === 'risk' ? 'active' : ''}`} onClick={() => setActiveTab('risk')}>{t.viewByRisk}</button>
              </div>
              {!activeTab && <div className="tab-instruction">{t.pickLensInstruction}</div>}
              {activeTab === 'return' && <ComparisonTable rows={sortByReturn(results.modules)} type="return" lang={lang} t={t} />}
              {activeTab === 'liquidity' && <ComparisonTable rows={sortByLiquidity(results.modules)} type="liquidity" lang={lang} t={t} />}
              {activeTab === 'tax' && <ComparisonTable rows={sortByTax(results.modules)} type="tax" lang={lang} t={t} />}
              {activeTab === 'risk' && <ComparisonTable rows={sortByRisk(results.modules)} type="risk" lang={lang} t={t} />}
            </div>

            {/* 7.6 Narrowing — merged into Summary at top of results */}

            {/* 7.7 Execution */}
            <div className="results-block">
              <div className="block-header">
                <h2 className="block-title">{t.execution}</h2>
                <div className="block-num">7.7</div>
              </div>
              <p className="section-intro">{t.executionIntro}</p>
              <ExecutionLayer narrowing={results.narrowing} inputs={results.inputs} lang={lang} />
            </div>

            {/* 7.8 Validation questions */}
            <div className="results-block">
              <div className="block-header">
                <h2 className="block-title">{t.validationQuestions}</h2>
                <div className="block-num">7.8</div>
              </div>
              <p className="section-intro">{t.validationIntro}</p>
              <div className="questions-list">
                <ol>
                  {results.validationQuestions.map((q, i) => {
                    // Support both string (legacy) and object format
                    if (typeof q === 'string') return <li key={i}>{q}</li>;
                    return (
                      <li key={i} className="rich-question">
                        <div className="rich-question-text">{q['question_' + lang]}</div>
                        {q['explain_' + lang] && (
                          <div className="rich-question-explain">{q['explain_' + lang]}</div>
                        )}
                        {(q['impact_yes_' + lang] || q['impact_no_' + lang]) && (
                          <div className="rich-question-impacts">
                            {q['impact_yes_' + lang] && (
                              <div className="rich-question-impact rich-question-impact-yes">
                                <div className="rich-question-impact-label">{lang === 'hu' ? 'Ha igen →' : 'If yes →'}</div>
                                <div className="rich-question-impact-text">{q['impact_yes_' + lang]}</div>
                              </div>
                            )}
                            {q['impact_no_' + lang] && (
                              <div className="rich-question-impact rich-question-impact-no">
                                <div className="rich-question-impact-label">{lang === 'hu' ? 'Ha nem →' : 'If no →'}</div>
                                <div className="rich-question-impact-text">{q['impact_no_' + lang]}</div>
                              </div>
                            )}
                          </div>
                        )}
                      </li>
                    );
                  })}
                </ol>
              </div>
            </div>

            {/* 7.9 JSON capture — developer-only, hidden unless ?test=1 */}
            {testMode && (
              <div className="results-block">
                <div className="block-header">
                  <h2 className="block-title">{t.jsonCapture}</h2>
                  <div className="block-num">7.9</div>
                </div>
                <p className="section-intro">{t.jsonNote}</p>
                <button className="json-toggle" onClick={() => setShowJson(!showJson)}>
                  {showJson ? t.hideJson : t.showJson}
                </button>
                {showJson && (
                  <pre className="json-block" style={{ marginTop: '12px' }}>
                    {JSON.stringify({
                      inputs: results.inputs,
                      marketState: results.marketState,
                      modules: results.modules.map(m => ({
                        id: m.id,
                        eligible: m.eligible,
                        netValue: m.netValue,
                        taxRate: m.taxRate,
                        tax: m.tax,
                        annualizedReturn: m.annualizedReturn,
                        liquidity: m.liquidity,
                        riskRating: m.riskRating,
                        fxExposure: m.fxExposure,
                        reason: m.eligible ? null : m['reason_' + lang],
                      })),
                      narrowing: results.narrowing.map(n => n.id),
                      timestamp: results.timestamp,
                    }, null, 2)}
                  </pre>
                )}
              </div>
            )}

          </div>
        </section>
      )}

      {/* Disclaimer */}
      <div className="disclaimer-bar">
        <div className="container">
          <strong>{t.disclaimerStrong}</strong> {t.disclaimer}
        </div>
      </div>

      <footer className="site-footer">
        <div className="container">
          <div className="footer-brand">markin.hu</div>
          <div>{t.footer}</div>
        </div>
      </footer>
    </>
  );
}

// =========================================================================

function ModuleCard({ mod, lang, t, inputs, rank, onTermClick, openTerms, onSelect, isSelected }) {
  const name = mod['name_' + lang];
  const sub = mod['sub_' + lang];

  if (!mod.eligible) {
    if (mod.missedOpportunity) {
      return (
        <div className="module-card missed-opportunity">
          <div className="module-header">
            <div>
              <div className="module-num">{mod.num}</div>
              <div className="module-name">{name}</div>
            </div>
          </div>
          <div className="module-subtitle">{sub}</div>
          <div className="missed-opportunity-banner">
            <div className="missed-opportunity-label">{lang === 'hu' ? '⚡ Elszalasztott opportunity' : '⚡ Missed opportunity'}</div>
            <div className="missed-opportunity-reason">{mod['reason_' + lang]}</div>
            {mod['remedyHint_' + lang] && (
              <div className="missed-opportunity-detail">
                {mod['remedyHint_' + lang]}
              </div>
            )}
          </div>
        </div>
      );
    }
    return (
      <div className="module-card ineligible">
        <div className="module-header">
          <div>
            <div className="module-num">{mod.num}</div>
            <div className="module-name">{name}</div>
          </div>
        </div>
        <div className="module-subtitle">{sub}</div>
        <div className="ineligible-reason">
          <div className="ineligible-reason-label">{lang === 'hu' ? 'Miért nem választható' : 'Why not eligible'}</div>
          <div className="ineligible-reason-text">{mod['reason_' + lang]}</div>
          {mod['remedyHint_' + lang] && (
            <div className="ineligible-remedy">
              <strong>{lang === 'hu' ? 'Mi tenné elérhetővé:' : 'What would make it eligible:'} </strong>
              {mod['remedyHint_' + lang]}
            </div>
          )}
        </div>
      </div>
    );
  }

  const isWait = mod.id === "wait";
  const isPenalty = mod.penalty;
  const rankClass = rank ? `rank-${rank}` : '';
  const clickable = onSelect && !isPenalty;
  const hasExecSteps = EXEC_STEPS[mod.id];

  // Identify possible terms in the module name for inline tooltips
  const termsInName = [];
  Object.keys(TERMS).forEach(termKey => {
    if (name.includes(termKey)) termsInName.push(termKey);
  });

  return (
    <div
      className={`module-card ${isWait ? 'wait' : ''} ${isPenalty ? 'penalty' : ''} ${rankClass} ${clickable ? 'module-card-clickable' : ''} ${isSelected ? 'selected' : ''}`}
      onClick={clickable ? onSelect : undefined}
    >
      {rank && (
        <div className={`rank-badge rank-badge-${rank}`}>
          {rank === 1 ? t.rankByReturn : rank === 2 ? t.rankSecond : t.rankThird}
        </div>
      )}
      <div className="module-header">
        <div>
          <div className="module-num">{mod.num}</div>
          <div className="module-name">
            {name}
            {termsInName.map(termKey => (
              <button
                key={termKey}
                className={`term-info-button ${openTerms[mod.id + '_' + termKey] ? 'active' : ''}`}
                onClick={(e) => { e.stopPropagation(); onTermClick(mod.id + '_' + termKey); }}
                title={lang === 'hu' ? 'Mi ez?' : 'What is this?'}
              >
                {t.infoButton}
              </button>
            ))}
          </div>
        </div>
      </div>
      {termsInName.map(termKey => openTerms[mod.id + '_' + termKey] && (
        <div key={termKey} className="term-definition" onClick={(e) => e.stopPropagation()}>
          <strong>{TERMS[termKey][lang].title}</strong>
          {TERMS[termKey][lang].body}
          {' '}
          <a href={TERMS[termKey][lang].source} target="_blank" rel="noopener noreferrer">
            {TERMS[termKey][lang].sourceLabel} →
          </a>
        </div>
      ))}
      <div className="module-subtitle">{sub}</div>
      <span className={`module-status ${mod.warning ? 'status-warning' : isPenalty ? 'status-penalty' : 'status-eligible'}`}>
        {mod.warning ? t.eligibilityWarning : isPenalty ? t.eligibilityRef : t.eligibilityYes}
      </span>
      {mod.warning && mod['warning_' + lang] && (
        <div style={{ fontSize: 12, color: '#8a6b1e', marginBottom: 8, fontStyle: 'italic' }}>
          ⚠ {mod['warning_' + lang]}
        </div>
      )}

      <div className="module-row">
        <span className="module-row-label">{t.netValue}</span>
        <span className="module-row-value positive">{fmtHuf(mod.netValue, lang)}</span>
      </div>
      {mod.lowNet !== mod.highNet && (
        <div className="module-row">
          <span className="module-row-label">{lang === 'hu' ? 'Tartomány' : 'Range'}</span>
          <span className="module-row-value">{fmtHuf(mod.lowNet, lang)} – {fmtHuf(mod.highNet, lang)}</span>
        </div>
      )}
      <div className="module-row">
        <span className="module-row-label">{lang === 'hu' ? 'Éves nettó hozam' : 'Annualized net return'}</span>
        <span className="module-row-value">{fmtPct(mod.annualizedReturn, lang)}</span>
      </div>
      <div className="module-row">
        <span className="module-row-label">{t.taxOwed}</span>
        <span className="module-row-value">{fmtHuf(mod.tax, lang)} ({fmtPct(mod.taxRate, lang, 0)})</span>
      </div>
      <div className="module-row">
        <span className="module-row-label">{t.liquidity}</span>
        <span className="module-row-value">{t['liq' + mod.liquidity]}</span>
      </div>
      <div className="module-row">
        <span className="module-row-label">{t.riskRating}</span>
        <span className="module-row-value">{t['risk' + mod.riskRating]}</span>
      </div>

      <div className="module-row" style={{ alignItems: 'flex-start' }}>
        <span className="module-row-label">{t.fxExposure}</span>
        <div style={{ flex: 1, marginLeft: 'auto', maxWidth: 160 }}>
          <div className="fx-bar">
            {mod.fxExposure.huf > 0 && <div className="fx-segment-huf" style={{ width: `${mod.fxExposure.huf}%` }} />}
            {mod.fxExposure.eur > 0 && <div className="fx-segment-eur" style={{ width: `${mod.fxExposure.eur}%` }} />}
            {mod.fxExposure.usd > 0 && <div className="fx-segment-usd" style={{ width: `${mod.fxExposure.usd}%` }} />}
          </div>
          <div className="fx-legend">
            {mod.fxExposure.huf > 0 && <span className="fx-legend-item"><span className="fx-swatch fx-segment-huf"></span>HUF {mod.fxExposure.huf}%</span>}
            {mod.fxExposure.eur > 0 && <span className="fx-legend-item"><span className="fx-swatch fx-segment-eur"></span>EUR {mod.fxExposure.eur}%</span>}
            {mod.fxExposure.usd > 0 && <span className="fx-legend-item"><span className="fx-swatch fx-segment-usd"></span>USD {mod.fxExposure.usd}%</span>}
          </div>
        </div>
      </div>

      {mod.allocation && mod.allocation.overflow > 0 && (
        <div className="allocation-note">
          <div className="allocation-note-label">{lang === 'hu' ? 'Allokációs megjegyzés' : 'Allocation note'}</div>
          <div className="allocation-note-text">{mod['allocationNote_' + lang]}</div>
        </div>
      )}

      {mod.fxScenarios && (
        <div className="fx-scenarios">
          <div className="fx-scenarios-label">{lang === 'hu' ? 'FX-szcenáriók (nettó érték)' : 'FX scenarios (net value)'}</div>
          <div className="fx-scenarios-grid">
            <div className="fx-scenario">
              <div className="fx-scenario-label">{mod.fxScenarios.hufStrengthens['label_' + lang]}</div>
              <div className="fx-scenario-value negative">{fmtHuf(mod.fxScenarios.hufStrengthens.value, lang)}</div>
            </div>
            <div className="fx-scenario central">
              <div className="fx-scenario-label">{mod.fxScenarios.fxConstant['label_' + lang]}</div>
              <div className="fx-scenario-value">{fmtHuf(mod.fxScenarios.fxConstant.value, lang)}</div>
            </div>
            <div className="fx-scenario">
              <div className="fx-scenario-label">{mod.fxScenarios.hufWeakens['label_' + lang]}</div>
              <div className="fx-scenario-value positive">{fmtHuf(mod.fxScenarios.hufWeakens.value, lang)}</div>
            </div>
          </div>
        </div>
      )}

      {mod['risks_' + lang] && (
        <div className="module-risks">
          <div className="module-risks-label">{t.topRisks}</div>
          <ul>
            {mod['risks_' + lang].map((r, i) => <li key={i}>{r}</li>)}
          </ul>
        </div>
      )}

      {mod['assumptions_' + lang] && (
        <div className="module-assumptions">
          <strong>{t.assumptions}:</strong> {mod['assumptions_' + lang]}
        </div>
      )}

      {clickable && hasExecSteps && (
        <div className="module-cta">
          {isSelected ? t.rankCollapse : t.rankExpand}
        </div>
      )}
    </div>
  );
}

    tbsz_aggh: "Akkor jó, ha TBSZ-t akarsz, de kisebb volatilitással.",
    nyesz: "Nyugdíjcélra jó, ha az SZJA-visszatérítés tényleg kihasználható.",
    fixmap: "Akkor erős, ha kiszámítható HUF-hozamot és egyszerűséget keresel.",
    pmap: "Akkor jó, ha az inflációs védelem fontosabb, mint a fix kamat.",
    map_plus: "Akkor erős, ha adómentes, sávos HUF-hozamot keresel.",
    bmap: "Akkor jó, ha változó kamatot akarsz DKJ-követéssel.",
    dkj: "Rövid pénzre jó, ahol a lejárati fegyelem fontosabb a maximális hozamnál.",
    emap: "Akkor jó, ha EUR-kitettséget is szeretnél HUF-vagyon mellé.",
    babakotveny: "Gyerekcélra erős, ha a támogatási plafon környékén használod.",
    huf_cash: "Likvid tartaléknak jó, nem hosszú távú hozammaximalizálásra.",
    fx_cash: "Devizás parkolópénzre jó, ha elfogadod az árfolyamkockázatot.",
  };
  const en = {
    tbsz_vwce: "Strong if the horizon is stable and equity volatility is acceptable.",
    tbsz_aggh: "Useful if you want a TBSZ wrapper with lower volatility.",
    nyesz: "Best for retirement money when the SZJA rebate is truly usable.",
    fixmap: "Strong if you want predictable HUF return and low complexity.",
    pmap: "Useful if inflation protection matters more than a fixed coupon.",
    map_plus: "Strong if you want tax-free stepped HUF returns.",
    bmap: "Useful if you want a floating DKJ-linked rate.",
    dkj: "Good for short money where maturity discipline matters more than max return.",
    emap: "Useful if EUR exposure belongs in the plan.",
    babakotveny: "Strong for child savings when used near the subsidy cap.",
    huf_cash: "Good as liquid reserve, not as long-term return maximizer.",
    fx_cash: "Good for parked FX cash if currency risk is acceptable.",
  };
  return (lang === 'hu' ? hu : en)[mod.id] || (lang === 'hu' ? "A döntés a hozam, likviditás és kockázat kompromisszuma." : "The decision depends on return, liquidity, and risk tradeoffs.");
}

function moduleCaveatLine(mod, inputs, lang) {
  const isHu = lang === 'hu';
  if (mod.id === "tbsz_vwce") return isHu ? "Ne ezt válaszd, ha a pénz 3-5 éven belül biztosan kellhet." : "Do not choose this if the money may be needed inside 3-5 years.";
  if (mod.id === "tbsz_aggh") return isHu ? "A várt hozam szerényebb, és a TBSZ-időzítés itt is számít." : "Expected return is lower, and TBSZ timing still matters.";
  if (["fixmap", "map_plus", "pmap", "bmap"].includes(mod.id)) return isHu ? "A korai visszaváltás költséges lehet, és a reálhozam inflációfüggő." : "Early redemption can cost money, and real return depends on inflation.";
  if (mod.id === "nyesz") return isHu ? "Csak nyugdíjcélra tiszta döntés; korai kilépésnél az előny visszaüthet." : "Clean only for retirement money; early exit can reverse the advantage.";
  if (mod.id === "babakotveny") return isHu ? "A pénz a gyerek 18 éves koráig zártabb, a támogatás plafonos." : "Money is locked toward the child's age 18, and subsidy is capped.";
  if (mod.id === "emap" || mod.id === "fx_cash") return isHu ? "A HUF-ban mért eredmény erősen árfolyamfüggő." : "The HUF result depends heavily on FX at exit.";
  if (mod.id === "dkj") return isHu ? "Hosszabb távon újra kell fektetni, ami új kamatkörnyezetet jelent." : "Longer horizons require reinvestment into a new rate environment.";
  return isHu ? "A legjobb választás attól függ, mennyire fontos a likviditás és a biztonság." : "The best choice depends on how much liquidity and safety matter.";
}

function modulePrimaryRisk(mod, lang) {
  const risks = mod['risks_' + lang];
  if (risks && risks.length > 0) return risks[0];
  return lang === 'hu' ? "A feltételezések változhatnak." : "Assumptions may change.";
}

function sensitivityItems(narrowing, inputs, showMultiPocket, lang) {
  const isHu = lang === 'hu';
  const ids = narrowing.map(n => n.id);
  const items = [];

  if (showMultiPocket) {
    items.push({
      label: isHu ? "Plafonok" : "Caps",
      text: isHu
        ? "A többzsebes eredmény azért jelenik meg, mert néhány adóelőnyös eszköz csak korlátozott összegig hatékony."
        : "The multi-pocket result appears because some tax-advantaged instruments are efficient only up to a cap."
    });
  }
  if (inputs.horizon_years < 5 && ids.includes("tbsz_vwce")) {
    items.push({
      label: isHu ? "Időtáv" : "Horizon",
      text: isHu
        ? "Ha a pénz tényleg 5 évnél korábban kell, a TBSZ adóelőnye gyengül, és a rövid kötvények előrébb kerülhetnek."
        : "If the money is truly needed before 5 years, the TBSZ tax edge weakens and shorter bonds can move up."
    });
  }
  if (ids.some(id => ["fixmap", "map_plus", "pmap", "bmap"].includes(id))) {
    items.push({
      label: isHu ? "Likviditás" : "Liquidity",
      text: isHu
        ? "Ha vészhelyzetben ehhez a pénzhez kell nyúlni, ne csak a hozamot nézd; a visszaváltási költség és időzítés döntő lehet."
        : "If this money may be needed in an emergency, do not optimize only for yield; redemption cost and timing matter."
    });
  }
  if (ids.some(id => ["tbsz_vwce", "emap", "fx_cash"].includes(id))) {
    items.push({
      label: isHu ? "Deviza" : "FX",
      text: isHu
        ? "Ha a HUF-ban mért biztonság fontosabb, a devizás vagy részvényes opciók hátrébb kerülnek."
        : "If HUF-measured certainty matters most, FX-heavy or equity-heavy options should move down."
    });
  }
  if (inputs.has_szja_payable === false) {
    items.push({
      label: isHu ? "SZJA" : "SZJA",
      text: isHu
        ? "SZJA-fizetés nélkül a NYESZ-visszatérítés nem használható, ezért a nyugdíjszámla előnye eltűnik."
        : "Without payable SZJA, the NYESZ rebate cannot be used, so the retirement-account edge disappears."
    });
  }
  items.push({
    label: isHu ? "Adatfrissesség" : "Data freshness",
    text: isHu
      ? "Új ÁKK-sorozat, MNB-döntés vagy nagy FX-mozgás után a sorrend változhat; döntés előtt ellenőrizd a friss kondíciókat."
      : "A new ÁKK series, MNB decision, or large FX move can change the order; verify fresh conditions before acting."
  });

// Multi-pocket allocation display — pretty donut chart + breakdown rows
function MultiPocketDisplay({ allocation, lang, t, inputs }) {
  const { pockets, totalAmount, totalValue, annualizedReturn } = allocation;
  const h = inputs.horizon_years;
  // Compute cumulative angles for SVG arc paths
  const cx = 110, cy = 110, r = 80, innerR = 45;
  let cumPct = 0;
  const segments = pockets.map(p => {
    const pct = p.amount / totalAmount;
    const start = cumPct;
    const end = cumPct + pct;
    cumPct = end;
    return { ...p, pct, startAngle: start * 360 - 90, endAngle: end * 360 - 90 };
  });

  function polarToCartesian(cx, cy, r, angleDeg) {
    const a = (angleDeg * Math.PI) / 180;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }
  function describeArc(cx, cy, rOuter, rInner, startAngle, endAngle) {
    const startOuter = polarToCartesian(cx, cy, rOuter, endAngle);
    const endOuter = polarToCartesian(cx, cy, rOuter, startAngle);
    const startInner = polarToCartesian(cx, cy, rInner, startAngle);
    const endInner = polarToCartesian(cx, cy, rInner, endAngle);
    const largeArc = endAngle - startAngle <= 180 ? "0" : "1";
    return [
      `M ${startOuter.x} ${startOuter.y}`,
      `A ${rOuter} ${rOuter} 0 ${largeArc} 0 ${endOuter.x} ${endOuter.y}`,
      `L ${startInner.x} ${startInner.y}`,
      `A ${rInner} ${rInner} 0 ${largeArc} 1 ${endInner.x} ${endInner.y}`,
      "Z"
    ].join(" ");
  }

  return (
    <div className="multipocket">
      <div className="multipocket-grid">
        <div className="multipocket-chart">
          <svg width="240" height="240" viewBox="0 0 240 240">
            <defs>
              <filter id="pocketShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
                <feOffset dx="0" dy="2" result="offsetblur" />
                <feComponentTransfer><feFuncA type="linear" slope="0.3" /></feComponentTransfer>
                <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>
            {/* Outer light ring */}
            <circle cx={cx} cy={cy} r={r + 8} fill="rgba(245,241,232,0.04)" />
            {/* Segments */}
            {segments.map((s, i) => (
              <path
                key={i}
                d={describeArc(cx, cy, r, innerR, s.startAngle, s.endAngle)}
                fill={s.color}
                stroke="rgba(13,27,42,0.5)"
                strokeWidth="2"
                filter="url(#pocketShadow)"
              />
            ))}
            {/* Center text */}
            <text x={cx} y={cy - 12} textAnchor="middle" fill="rgba(245,241,232,0.7)" fontFamily="Inter" fontSize="10" letterSpacing="2" textTransform="uppercase">
              {lang === 'hu' ? 'KOMBINÁLT' : 'COMBINED'}
            </text>
            <text x={cx} y={cy + 10} textAnchor="middle" fill="#f5f1e8" fontFamily="JetBrains Mono" fontWeight="700" fontSize="16">
              {fmtHuf(totalValue, lang)}
            </text>
            <text x={cx} y={cy + 30} textAnchor="middle" fill="#e8d59f" fontFamily="Inter" fontSize="11">
              {fmtPct(annualizedReturn, lang)} {lang === 'hu' ? 'éves' : 'annualized'}
            </text>
          </svg>
        </div>
        <div className="multipocket-rows">
          {segments.map((s, i) => (
            <div className="multipocket-row" key={i}>
              <div className="multipocket-row-bullet" style={{ background: s.color }}></div>
              <div className="multipocket-row-content">
                <div className="multipocket-row-name">{s['name_' + lang]}</div>
                <div className="multipocket-row-meta">
                  <span className="multipocket-row-amount">{fmtHuf(s.amount, lang)} ({(s.pct * 100).toFixed(0)}%)</span>
                  <span className="multipocket-row-arrow">→</span>
                  <span className="multipocket-row-value">{fmtHuf(s.value, lang)}</span>
                </div>
                <div className="multipocket-row-rate">{s['rate_label_' + lang]}</div>
              </div>
            </div>
          ))}
          <div className="multipocket-total">
            <span className="multipocket-total-label">{lang === 'hu' ? 'Összes érték' : 'Total value'} ({fmtNum(h, lang, 1)} {t.years})</span>
            <span className="multipocket-total-value">{fmtHuf(totalValue, lang)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

            { name: lang === 'hu' ? 'Bank (Erste/K&H/OTP)' : 'Bank (Erste/K&H/OTP)', tag: 'alternative', use: lang === 'hu' ? 'Kényelmes, ha már van banki kapcsolat. ~0,5% díj.' : 'Convenient if user already banks here. ~0.5% fee.' },
            { name: 'Magyar Posta', tag: 'alternative', use: lang === 'hu' ? 'Személyes ügyintézés.' : 'In-person option.' },
          ];
        } else if (n.id === "babakotveny") {
          providers = [
            { name: 'WebKincstár / Államkincstár', tag: 'primary', use: lang === 'hu' ? 'Babakötvény-számla a Kincstárnál (Start-számla).' : 'Babakötvény account at Kincstár (Start-account).' },
          ];
        } else if (n.id === "huf_cash") {
          providers = [
            { name: lang === 'hu' ? 'Bankmonitor-szűrés' : 'Bankmonitor filter', tag: 'primary', use: lang === 'hu' ? 'Aktuális legjobb HUF betéti kamatok. Akciós feltételek figyelendők.' : 'Current best HUF deposit rates. Watch promo conditions.' },
          ];
        } else if (n.id === "fx_cash") {
          providers = [
            { name: 'Wise', tag: 'primary', use: lang === 'hu' ? 'Legjobb multi-devizás UX, szűk FX-spread.' : 'Best multi-currency UX, tight FX spread.' },
            { name: 'Lightyear (általános számla)', tag: 'alternative', use: lang === 'hu' ? 'Jelenleg legmagasabb USD-kamat.' : 'Highest USD rate currently observed.' },
            { name: 'IBKR uninvested cash', tag: 'alternative', use: lang === 'hu' ? 'Interbank FX, nagyobb tételeknél előnyös.' : 'Interbank FX, advantageous at scale.' },
          ];
        } else if (n.id === "nyesz") {
          providers = [
            { name: 'Erste / K&H / OTP', tag: 'primary', use: lang === 'hu' ? 'Banki NYESZ, banki portfólió-kínálattal.' : 'Bank-channel NYESZ with bank portfolio range.' },
            { name: 'Concorde / Equilor', tag: 'alternative', use: lang === 'hu' ? 'Bróker NYESZ, szélesebb befektetési választék.' : 'Broker NYESZ, broader investment selection.' },
          ];
        } else if (n.id === "wait") {
          providers = [
            { name: lang === 'hu' ? 'Folyószámla / azonnali megtakarítás' : 'Current / instant savings', tag: 'primary', use: lang === 'hu' ? 'Tartsd meglévő számlán, várj új információra.' : 'Hold in current account, await new information.' },
          ];
        }

        return (
          <div key={n.id} className="execution-card">
            <div className="execution-card-header">{n['name_' + lang]}</div>
            {providers.map((p, i) => (
              <div key={i} className="provider-row">
                <div className="provider-name">
                  <span className={`provider-tag ${p.tag === 'existing' ? 'existing' : ''}`}>{p.tag}</span>
                  {p.name}
                </div>
                <div className="provider-use">{p.use}</div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
