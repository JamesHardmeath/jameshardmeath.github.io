<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google" content="notranslate" />
<title>markin.hu — Mai döntés</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!--
  PROTOTYPE NOTE: This single-file prototype uses CDN-hosted React+Babel and in-browser
  JSX compilation. Appropriate for Phase A prototype but NOT for production. The eventual
  production site will use Vite or Next.js with a proper build pipeline. Risks accepted:
    - CDN outage = app fails to load
    - Babel in-browser compilation = slower initial render (~500ms)
    - No bundling / minification of app code
  These tradeoffs are deliberate for prototype iteration speed.
-->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --ink: #0d1b2a;
    --ink-soft: #1b263b;
    --paper: #f5f1e8;
    --paper-warm: #ede6d3;
    --rule: #d4cdb8;
    --accent: #8b3a3a;
    --accent-soft: #b8857a;
    --positive: #2d5a3d;
    --negative: #8b3a3a;
    --muted: #6b6456;
    --highlight: #e8d59f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139, 58, 58, 0.03), transparent 50%),
      radial-gradient(circle at 80% 60%, rgba(13, 27, 42, 0.04), transparent 50%);
    min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01"; }
  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

  /* Header */
  header.site-header {
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    padding: 20px 0;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
    background: rgba(245, 241, 232, 0.92);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand-dot { color: var(--accent); }
  .brand-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 500;
  }
  .lang-toggle {
    display: flex;
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    font-size: 13px;
    font-weight: 500;
  }
  .lang-toggle button {
    background: transparent;
    border: none;
    padding: 6px 14px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    font-family: inherit;
  }
  .lang-toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }
  .lang-toggle button:hover:not(.active) { background: var(--paper-warm); color: var(--ink); }

  /* Hero */
  .hero {
    padding: 64px 0 48px;
    border-bottom: 1px solid var(--rule);
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 48px;
    align-items: start;
  }
  @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 24px; } }
  .hero-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .hero-headline em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .hero-lede {
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 540px;
  }
  .hero-meta {
    border-left: 2px solid var(--accent);
    padding: 4px 0 4px 18px;
    font-size: 13px;
  }
  .hero-meta-label {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 11px;
  }
  .hero-meta-value { color: var(--ink); margin-bottom: 14px; line-height: 1.5; }
  .hero-meta-value:last-child { margin-bottom: 0; }

  /* Form */
  .form-section {
    padding: 56px 0;
    border-bottom: 1px solid var(--rule);
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .section-intro {
    color: var(--muted);
    margin-bottom: 32px;
    max-width: 640px;
    font-size: 15px;
  }
  .form-card {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 32px;
    box-shadow: 0 1px 0 rgba(13, 27, 42, 0.04);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px 24px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }
  .field-hint { font-size: 12px; color: var(--muted); font-style: italic; }
  .field input, .field select {
    padding: 10px 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .field input.mono, .field select.mono { font-family: 'JetBrains Mono', monospace; }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(13, 27, 42, 0.08);
  }
  .field-checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
  }
  .field-checkbox input { width: 18px; height: 18px; accent-color: var(--ink); }
  .field-checkbox label { font-size: 14px; color: var(--ink); cursor: pointer; }

  .optional-toggle {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px dashed var(--rule);
  }
  .toggle-button {
    background: none;
    border: none;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-button:hover { color: var(--ink); }
  .toggle-icon { display: inline-block; transition: transform 0.2s; }
  .toggle-icon.open { transform: rotate(90deg); }
  .optional-content {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }

  .submit-row {
    margin-top: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .submit-button {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 32px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .submit-button:hover { background: var(--accent); transform: translateY(-1px); }
  .submit-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .submit-note { font-size: 13px; color: var(--muted); font-style: italic; }

  .validation-error {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(139, 58, 58, 0.08);
    border-left: 3px solid var(--accent);
    color: var(--accent);
    font-size: 13px;
  }

  /* Results */
  .results-section { padding: 56px 0; border-bottom: 1px solid var(--rule); }
  .results-block { margin-bottom: 48px; }
  .results-block:last-child { margin-bottom: 0; }
  .block-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .block-title {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.015em;
  }
  .block-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Inputs restated table */
  .restated-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    padding: 24px;
  }
  .restated-item { display: flex; flex-direction: column; gap: 4px; }
  .restated-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
  }
  .restated-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--ink);
    font-weight: 500;
  }

  /* Market snapshot */
  .market-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
  }
  .market-table tr { border-bottom: 1px solid var(--rule); }
  .market-table tr:last-child { border-bottom: none; }
  .market-table td { padding: 12px 16px; vertical-align: top; }
  .market-table td:first-child { color: var(--ink-soft); width: 50%; }
  .market-table td:last-child { font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 500; }
  .market-table .source { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }

  /* Module cards */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 16px;
  }
  .module-card {
    background: rgba(255, 255, 255, 0.65);
    border: 1px solid var(--rule);
    padding: 20px 22px;
    transition: all 0.2s;
    position: relative;
  }
  .module-card.ineligible { opacity: 0.85; background: rgba(0, 0, 0, 0.02); }
  .ineligible-reason {
    margin-top: 12px;
    padding: 14px 16px;
    background: rgba(139, 58, 58, 0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .ineligible-reason-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .ineligible-reason-text {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 8px;
    line-height: 1.45;
  }
  .ineligible-remedy {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.5;
    padding-top: 8px;
    border-top: 1px solid rgba(139, 58, 58, 0.15);
  }
  .ineligible-remedy strong {
    font-style: normal;
    color: var(--ink);
  }

  /* Missed opportunity — special style for high-value modules user is excluding */
  .module-card.missed-opportunity {
    opacity: 1;
    background: rgba(232, 213, 159, 0.12);
    border: 1px solid var(--highlight);
  }
  .missed-opportunity-banner {
    margin-top: 12px;
    padding: 16px 18px;
    background: rgba(232, 213, 159, 0.4);
    border-left: 3px solid #b8861f;
    border-radius: 0 2px 2px 0;
  }
  .missed-opportunity-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #8a6b1e;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .missed-opportunity-reason {
    font-size: 14px;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 10px;
    line-height: 1.45;
  }
  .missed-opportunity-detail {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.55;
    padding-top: 10px;
    border-top: 1px solid rgba(184, 134, 31, 0.25);
  }

  /* FX scenarios in module card */
  .fx-scenarios {
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(232, 213, 159, 0.18);
    border-left: 3px solid var(--highlight);
    border-radius: 0 2px 2px 0;
  }
  .fx-scenarios-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #8a6b1e;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .fx-scenarios-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .fx-scenario {
    padding: 8px 10px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 2px;
  }
  .fx-scenario.central {
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid var(--rule);
  }
  .fx-scenario-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .fx-scenario-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }
  .fx-scenario-value.positive { color: var(--positive); }
  .fx-scenario-value.negative { color: var(--negative); }

  /* Allocation note (Babakötvény overflow) */
  .allocation-note {
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(139, 58, 58, 0.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .allocation-note-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .allocation-note-text {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* Test mode panel */
  .test-mode-panel {
    background: #1a1a1a;
    color: #00ff88;
    padding: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 24px auto;
    max-width: 1200px;
    border-radius: 4px;
    overflow-x: auto;
  }
  .test-mode-panel h2 {
    color: #ffaa00;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }
  .test-result { padding: 6px 12px; margin: 4px 0; border-radius: 2px; }
  .test-result.pass { background: rgba(0, 255, 136, 0.1); }
  .test-result.fail { background: rgba(255, 60, 60, 0.15); color: #ff6060; }
  .test-result-label { font-weight: 700; }
  .test-result-detail { color: #888; margin-left: 8px; }
  .module-card.penalty { border-left: 3px solid var(--accent); background: rgba(139, 58, 58, 0.03); }
  .module-card.wait { border-left: 3px solid var(--highlight); }
  .module-card.top-pick { border: 2px solid var(--ink); background: var(--paper); }
  .module-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }
  .module-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .module-name {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .module-subtitle { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 14px; }
  .module-status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 12px;
  }
  .status-eligible { background: rgba(45, 90, 61, 0.1); color: var(--positive); }
  .status-ineligible { background: rgba(139, 58, 58, 0.1); color: var(--accent); }
  .status-warning { background: rgba(232, 213, 159, 0.4); color: #8a6b1e; }
  .status-penalty { background: rgba(139, 58, 58, 0.15); color: var(--accent); }
  .module-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 13px;
  }
  .module-row:last-of-type { border-bottom: none; }
  .module-row-label { color: var(--ink-soft); font-weight: 500; }
  .module-row-value { font-family: 'JetBrains Mono', monospace; text-align: right; color: var(--ink); }
  .module-row-value.positive { color: var(--positive); font-weight: 600; }
  .module-row-value.negative { color: var(--negative); font-weight: 600; }
  .module-risks {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .module-risks-label { font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .module-risks ul { list-style: none; padding: 0; }
  .module-risks li { padding: 2px 0; padding-left: 12px; position: relative; }
  .module-risks li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .module-assumptions {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.02);
    border-left: 2px solid var(--rule);
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
  }

  /* Tabs */
  .tabs-bar {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tab-button {
    background: none;
    border: none;
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tab-button:hover { color: var(--ink); }
  .tab-button.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab-instruction {
    background: rgba(232, 213, 159, 0.25);
    border-left: 3px solid var(--highlight);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    font-style: italic;
  }

  /* Comparison table */
  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
  }
  .comparison-table thead { background: var(--ink); color: var(--paper); }
  .comparison-table th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .comparison-table th.num, .comparison-table td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .comparison-table tr { border-bottom: 1px solid var(--rule); }
  .comparison-table tr:hover { background: rgba(0, 0, 0, 0.02); }
  .comparison-table tbody tr:last-child { border-bottom: none; }
  .comparison-table td { padding: 11px 16px; }
  .rank-cell {
    width: 32px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 12px;
  }

  /* Narrowing section */
  .narrowing-card {
    background: var(--ink);
    color: var(--paper);
    padding: 32px;
    border-radius: 2px;
  }
  .narrowing-card .section-label { color: var(--highlight); }
  .narrowing-card .section-label::before { background: var(--highlight); }
  .narrowing-card .block-title { color: var(--paper); }
  .narrowing-text {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    line-height: 1.5;
    color: rgba(245, 241, 232, 0.92);
    margin-bottom: 20px;
  }
  .narrowing-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .narrowing-option {
    background: rgba(245, 241, 232, 0.08);
    border-left: 2px solid var(--highlight);
    padding: 14px 18px;
  }
  .narrowing-option-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--highlight);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .narrowing-option-name {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    color: var(--paper);
    margin-bottom: 4px;
  }
  .narrowing-option-detail { font-size: 12px; color: rgba(245, 241, 232, 0.7); }

  /* Execution */
  .execution-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }
  .execution-card {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    padding: 22px;
  }
  .execution-card-header {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    margin-bottom: 12px;
    color: var(--ink);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .provider-row {
    padding: 12px 0;
    border-bottom: 1px dotted var(--rule);
  }
  .provider-row:last-child { border-bottom: none; }
  .provider-name {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    font-size: 14px;
  }
  .provider-use { font-size: 12px; color: var(--muted); font-style: italic; }
  .provider-tag {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    background: var(--paper-warm);
    border-radius: 2px;
    margin-right: 6px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .provider-tag.existing { background: var(--ink); color: var(--paper); }

  /* Validation questions */
  .questions-list {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--rule);
    padding: 24px 28px;
  }
  .questions-list ol { list-style: none; counter-reset: q; padding: 0; }
  .questions-list li {
    counter-increment: q;
    padding: 14px 0 14px 50px;
    position: relative;
    border-bottom: 1px solid var(--rule);
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink-soft);
  }
  .questions-list li:last-child { border-bottom: none; }
  .questions-list li::before {
    content: counter(q, decimal-leading-zero);
    position: absolute;
    left: 0;
    top: 14px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
  }
  .rich-question .rich-question-text {
    font-weight: 600;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.45;
    margin-bottom: 8px;
  }
  .rich-question-explain {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 12px;
    font-style: italic;
  }
  .rich-question-impacts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  @media (max-width: 600px) {
    .rich-question-impacts { grid-template-columns: 1fr; }
  }
  .rich-question-impact {
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 13px;
    line-height: 1.5;
  }
  .rich-question-impact-yes {
    background: rgba(45, 90, 61, 0.08);
    border-left: 3px solid var(--positive);
  }
  .rich-question-impact-no {
    background: rgba(139, 58, 58, 0.07);
    border-left: 3px solid var(--accent);
  }
  .rich-question-impact-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .rich-question-impact-yes .rich-question-impact-label { color: var(--positive); }
  .rich-question-impact-no .rich-question-impact-label { color: var(--accent); }
  .rich-question-impact-text {
    color: var(--ink-soft);
    font-size: 13px;
  }

  /* JSON capture */
  .json-block {
    background: var(--ink);
    color: var(--paper);
    padding: 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    border-radius: 2px;
    max-height: 400px;
    overflow-y: auto;
  }
  .json-toggle {
    background: var(--ink-soft);
    color: var(--paper);
    border: none;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    font-weight: 600;
  }

  /* Disclaimer */
  .disclaimer-bar {
    background: var(--ink);
    color: rgba(245, 241, 232, 0.85);
    padding: 24px 0;
    font-size: 13px;
    line-height: 1.6;
  }
  .disclaimer-bar strong { color: var(--paper); }
  .disclaimer-bar a { color: var(--highlight); text-decoration: underline; }

  footer.site-footer {
    background: var(--ink);
    color: rgba(245, 241, 232, 0.7);
    padding: 32px 0;
    font-size: 12px;
    text-align: center;
  }
  footer.site-footer .footer-brand {
    font-family: 'Fraunces', serif;
    color: var(--paper);
    margin-bottom: 4px;
    font-size: 14px;
  }

  /* Currency exposure visualization */
  .fx-bar {
    display: flex;
    height: 8px;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
    border: 1px solid var(--rule);
  }
  .fx-segment-huf { background: var(--accent); }
  .fx-segment-eur { background: var(--ink-soft); }
  .fx-segment-usd { background: var(--highlight); }
  .fx-legend { display: flex; gap: 12px; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .fx-legend-item { display: flex; align-items: center; gap: 4px; }
  .fx-swatch { width: 8px; height: 8px; border-radius: 1px; }

  /* Loading */
  .computing {
    text-align: center;
    padding: 64px 24px;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--muted);
    font-style: italic;
  }

  /* Amount field with slider */
  .amount-field-wrap { grid-column: span 2; }
  @media (max-width: 600px) { .amount-field-wrap { grid-column: span 1; } }
  .amount-input-row { display: flex; gap: 10px; align-items: stretch; }
  .amount-input-row input { flex: 1; font-size: 18px; font-weight: 600; }
  .amount-presets {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .preset-button {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .preset-button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .preset-button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .slider-row { margin-top: 12px; }
  .slider-track {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .slider-track::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--ink);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid var(--paper);
    box-shadow: 0 1px 4px rgba(13, 27, 42, 0.3);
    transition: transform 0.1s;
  }
  .slider-track::-webkit-slider-thumb:hover { transform: scale(1.15); background: var(--accent); }
  .slider-track::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--ink);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid var(--paper);
    box-shadow: 0 1px 4px rgba(13, 27, 42, 0.3);
  }
  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  .currency-suffix {
    display: flex;
    align-items: center;
    padding: 0 14px;
    border: 1px solid var(--rule);
    background: var(--paper-warm);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--ink-soft);
    font-size: 14px;
    min-width: 80px;
    justify-content: center;
  }

  /* Term with info tooltip */
  .term-info {
    display: inline-flex;
    align-items: baseline;
    gap: 2px;
  }
  .term-info-button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75em;
    padding: 0 2px;
    vertical-align: super;
    font-weight: 700;
    border-radius: 50%;
    width: 14px;
    height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: all 0.15s;
  }
  .term-info-button:hover { background: var(--accent); color: var(--paper); }
  .term-info-button.active { background: var(--accent); color: var(--paper); }
  .term-definition {
    background: rgba(232, 213, 159, 0.25);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    margin: 10px 0;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-soft);
    border-radius: 0 2px 2px 0;
    font-style: normal;
  }
  .term-definition strong {
    color: var(--ink);
    font-style: normal;
    display: block;
    margin-bottom: 4px;
  }
  .term-definition a {
    color: var(--accent);
    text-decoration: underline;
    font-weight: 500;
  }
  .term-definition a:hover { color: var(--ink); }

  /* Rank badges */
  .rank-badge {
    position: absolute;
    top: -10px;
    right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    padding: 4px 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-radius: 2px;
    line-height: 1.2;
  }
  .rank-badge-1 {
    background: var(--accent);
    color: var(--paper);
    box-shadow: 0 2px 6px rgba(139, 58, 58, 0.3);
  }
  .rank-badge-2 {
    background: var(--ink-soft);
    color: var(--paper);
  }
  .rank-badge-3 {
    background: var(--paper-warm);
    color: var(--ink);
    border: 1px solid var(--rule);
  }
  .module-card.rank-1 {
    border: 2px solid var(--accent);
    box-shadow: 0 4px 16px rgba(139, 58, 58, 0.1);
    background: var(--paper);
  }
  .module-card.rank-2 {
    border-color: var(--ink-soft);
    border-width: 1.5px;
  }
  .module-card.rank-3 {
    border-color: var(--ink-soft);
  }
  .module-card-clickable {
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .module-card-clickable:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(13, 27, 42, 0.08);
  }
  .module-card-clickable.selected {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(139, 58, 58, 0.15);
  }
  .module-cta {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--rule);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .module-cta::after {
    content: '↓';
    font-weight: 700;
  }
  .module-card-clickable.selected .module-cta::after {
    content: '↑';
  }

  /* Executive summary card */
  .summary-card {
    background: var(--ink);
    color: var(--paper);
    padding: 36px 40px;
    border-radius: 2px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
    border-top: 4px solid var(--highlight);
  }
  .summary-card::before {
    display: none;
  }
  .summary-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--highlight);
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .summary-label::before {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--highlight);
  }
  .summary-title {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    line-height: 1.15;
    color: var(--paper);
  }
  .summary-headline {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.4;
    color: rgba(245, 241, 232, 0.92);
    margin-bottom: 24px;
    max-width: 800px;
  }
  .summary-headline strong {
    font-style: normal;
    font-weight: 600;
    color: var(--highlight);
  }
  .summary-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(245, 241, 232, 0.15);
  }
  .summary-stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(232, 213, 159, 0.8);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .summary-stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--paper);
  }
  .summary-stat-detail {
    font-size: 12px;
    color: rgba(245, 241, 232, 0.65);
    margin-top: 4px;
  }
  .summary-tradeoff {
    margin-top: 22px;
    padding: 16px 20px;
    background: rgba(245, 241, 232, 0.06);
    border-left: 3px solid var(--highlight);
    font-size: 14px;
    line-height: 1.55;
    color: rgba(245, 241, 232, 0.88);
    border-radius: 0 2px 2px 0;
  }
  .summary-tradeoff strong {
    color: var(--paper);
  }

  .decision-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .decision-grid { grid-template-columns: 1fr; }
  }
  .decision-kicker {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--highlight);
    font-weight: 700;
    margin-bottom: 10px;
  }
  .decision-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 500;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--paper);
    margin-bottom: 14px;
  }
  .decision-copy {
    font-size: 16px;
    line-height: 1.65;
    color: rgba(245, 241, 232, 0.82);
    max-width: 680px;
  }
  .decision-copy strong { color: var(--highlight); font-weight: 700; }
  .decision-metrics {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  @media (max-width: 520px) {
    .decision-metrics { grid-template-columns: 1fr; }
  }
  .decision-metric {
    background: rgba(245, 241, 232, 0.06);
    border: 1px solid rgba(245, 241, 232, 0.12);
    padding: 14px 16px;
    min-height: 88px;
  }
  .decision-metric-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(232, 213, 159, 0.85);
    font-weight: 700;
    margin-bottom: 7px;
  }
  .decision-metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 19px;
    font-weight: 700;
    color: var(--paper);
  }
  .decision-metric-detail {
    margin-top: 4px;
    font-size: 12px;
    color: rgba(245, 241, 232, 0.58);
    line-height: 1.45;
  }
  .decision-shortlist {
    margin-top: 28px;
    padding-top: 26px;
    border-top: 1px solid rgba(245, 241, 232, 0.14);
  }
  .decision-section-heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 14px;
  }
  .decision-section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--paper);
    letter-spacing: -0.01em;
  }
  .decision-section-note {
    font-size: 12px;
    color: rgba(245, 241, 232, 0.58);
    font-style: italic;
  }
  .shortlist-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }
  @media (max-width: 860px) {
    .shortlist-grid { grid-template-columns: 1fr; }
  }
  .shortlist-card {
    background: rgba(245, 241, 232, 0.06);
    border: 1px solid rgba(245, 241, 232, 0.13);
    padding: 18px;
    min-height: 100%;
  }
  .shortlist-card.primary {
    background: rgba(232, 213, 159, 0.12);
    border-color: rgba(232, 213, 159, 0.42);
  }
  .shortlist-rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--highlight);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .shortlist-name {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--paper);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .shortlist-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px dotted rgba(245, 241, 232, 0.16);
    font-size: 13px;
  }
  .shortlist-row:last-of-type { border-bottom: none; }
  .shortlist-row span:first-child { color: rgba(245, 241, 232, 0.62); }
  .shortlist-row span:last-child {
    font-family: 'JetBrains Mono', monospace;
    color: var(--paper);
    text-align: right;
    font-weight: 600;
  }
  .shortlist-fit,
  .shortlist-caveat {
    margin-top: 12px;
    font-size: 12px;
    line-height: 1.55;
    color: rgba(245, 241, 232, 0.76);
  }
  .shortlist-fit strong,
  .shortlist-caveat strong {
    color: var(--highlight);
    font-weight: 700;
  }
  .sensitivity-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  @media (max-width: 700px) {
    .sensitivity-grid { grid-template-columns: 1fr; }
  }
  .sensitivity-item {
    background: rgba(245, 241, 232, 0.05);
    border-left: 3px solid var(--highlight);
    padding: 14px 16px;
  }
  .sensitivity-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--highlight);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .sensitivity-text {
    font-size: 13px;
    line-height: 1.55;
    color: rgba(245, 241, 232, 0.78);
  }

  /* Multi-pocket allocation display — pretty donut + rows */
  .multipocket {
    margin-top: 24px;
    padding: 24px;
    background: rgba(245, 241, 232, 0.06);
    border-radius: 4px;
    border: 1px solid rgba(232, 213, 159, 0.15);
  }
  .multipocket-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px;
    align-items: center;
  }
  @media (max-width: 720px) {
    .multipocket-grid {
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .multipocket-chart {
      display: flex;
      justify-content: center;
    }
  }
  .multipocket-chart svg {
    display: block;
  }
  .multipocket-rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .multipocket-row {
    display: grid;
    grid-template-columns: 16px 1fr;
    gap: 14px;
    align-items: start;
    padding: 14px 16px;
    background: rgba(245, 241, 232, 0.04);
    border-radius: 3px;
    transition: background 0.15s;
  }
  .multipocket-row:hover {
    background: rgba(245, 241, 232, 0.08);
  }
  .multipocket-row-bullet {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    margin-top: 4px;
    box-shadow: 0 0 0 2px rgba(245, 241, 232, 0.15);
  }
  .multipocket-row-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .multipocket-row-name {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--paper);
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .multipocket-row-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(245, 241, 232, 0.7);
  }
  .multipocket-row-amount {
    color: rgba(245, 241, 232, 0.65);
  }

// =========================================================================
// HELPER FUNCTIONS
// =========================================================================
function fmtHuf(n, lang) {
  if (n == null || isNaN(n)) return "—";
  const formatter = new Intl.NumberFormat('hu-HU', { maximumFractionDigits: 0 });
  return formatter.format(Math.round(n)) + " Ft";
}
function fmtHufStatic(n) {
  if (n == null || isNaN(n)) return "—";
  const formatter = new Intl.NumberFormat('hu-HU', { maximumFractionDigits: 0 });
  return formatter.format(Math.round(n)) + " Ft";
}
function fmtPct(n, lang, digits = 2) {
  if (n == null || isNaN(n)) return "—";
  const v = (n * 100).toFixed(digits);
  return lang === 'hu' ? v.replace('.', ',') + " %" : v + "%";
}
function fmtNum(n, lang, digits = 0) {
  if (n == null || isNaN(n)) return "—";
  const v = n.toFixed(digits);
  return lang === 'hu' ? v.replace('.', ',') : v;
}
function convertToHuf(amount, currency) {
  if (currency === "HUF") return amount;
  if (currency === "EUR") return amount * MARKET_STATE.fxHufEur;
  if (currency === "USD") return amount * MARKET_STATE.fxHufUsd;
  return amount;
}

// FX scenario assumptions for showing range outcomes.
// Central case: today's FX (no change).
// Low case: HUF strengthens (target currency weakens) — adverse for HUF-resident holding FX.
// High case: HUF weakens (target currency strengthens) — favorable for HUF-resident holding FX.
// Assumption magnitudes are educational rough-cut figures, not forecasts.
function fxScenarioRange(horizonYears) {
  // Annual FX volatility ~10%; over horizon, ±~15% per 5y is a reasonable retail-investor range
  const oneSigmaAtHorizon = Math.min(0.30, 0.10 * Math.sqrt(horizonYears));
  return { low: 1 - oneSigmaAtHorizon, central: 1.0, high: 1 + oneSigmaAtHorizon };
}

// TBSZ tax bracket — based on NAV rules for post-2025 contracts.
// Total tax burden = SZJA + szocho. Per NAV and verified across allampapirkalkulator.hu,
// grantis.hu, martincsekzsolt.hu, szjabevallas2026.hu:
//   - 0%  if held to end of 5-year lekötési időszak (Dec 31 of gyűjtőév+5)
//   - 18% if held to end of 3-year lekötési időszak (10% SZJA + 8% szocho)
//   - 28% if broken before 3 years (15% SZJA + 13% szocho)
//
// The lekötési időszak begins Jan 1 of the year AFTER the gyűjtőév.
// So a fresh 2026 deposit needs ~5.5 years from "today" (mid-2026) to reach 0%.
// An existing prior-year (2025) deposit needs only ~4.5 years from today.
//
// "existingTbsz" values: "none" (new TBSZ this year), "current_year" (same as none for clock),
// "prior_year" (one extra year of accumulation already done).
function tbszTaxRate(horizonYears, existingTbsz) {
  const bonusYears = existingTbsz === "prior_year" ? 1 : 0;
  const effectiveYears = horizonYears + bonusYears;
  if (effectiveYears >= 5.5) return 0;
  if (effectiveYears >= 3.5) return 0.18;
  return 0.28;
}

// =========================================================================
// MODULE CAPACITY — how much money each module can sensibly absorb.
// For modules with no cap, capacity is Infinity.
// For capped modules, capacity represents the amount that captures the wrapper's full advantage.
// =========================================================================
function getModuleCapacity(moduleId, inputs) {
  const yearsToEighteen = Math.min(inputs.horizon_years, 18);
  const horizonYears = inputs.horizon_years;

  switch (moduleId) {
    case "babakotveny":
      if (!inputs.has_child_under_18) return 0;
      if (inputs.existing_babakotveny_open) {
        // Existing account — only the unused per-year subsidy capacity remains useful
        // Assume remaining horizon for new contributions is ~5y or less
        return 120000 * Math.min(yearsToEighteen, 5) * 0.5; // half-assumption since some years used
      }
      return 120000 * Math.min(yearsToEighteen, 5);
    case "nyesz":
      if (!inputs.has_szja_payable) return 0;
      // The 20% rebate is capped at 100,000 Ft/year — full subsidy at 500,000 Ft/year deposit
      // Reasonable annual deposit: 500,000 Ft; over horizon = 500k * min(h, 10)
      if (horizonYears < 10) return 0; // honored ineligibility
      return 500000 * Math.min(horizonYears, 10);
    default:
      return Infinity;
  }
}

// =========================================================================
// PER-UNIT RETURN COMPUTATION
// Returns the annualized after-tax-after-fee return rate for 1 unit of money in this module.
// Used by the overflow router to pick the next-best destination.
// =========================================================================
function computeModuleStandalonePerUnitReturn(moduleId, inputs) {
  // Compute for 1M HUF baseline (returns are proportional for fixed-rate modules)
  const testInputs = { ...inputs, amount: 1000000, currency: "HUF" };
  const result = calculateModule(moduleId, testInputs);
  if (!result || !result.eligible || result.penalty || result.missedOpportunity) return -1;
  return result.annualizedReturn || -1;
}


// =========================================================================
// ENGINE — calculate each module
// =========================================================================
function calculateModule(moduleId, inputs) {
  const amountHuf = convertToHuf(inputs.amount, inputs.currency);
  const h = inputs.horizon_years;

  switch (moduleId) {
    case "tbsz_vwce": {
      const ineligible = inputs.tax_residency !== "HU";
      if (ineligible) return { eligible: false, reason_hu: "Nem magyar adóügyi illetőség", reason_en: "Non-HU tax residency", remedyHint_hu: "Csak magyar adóügyi illetőséggel elérhető.", remedyHint_en: "Only available with Hungarian tax residency." };

      const warning = h < 3;
      // Expected USD return on VWCE (broad market equity, in USD)
      const nominalReturnUsd = 0.0628; // 6.5% gross minus 0.22% TER
      const fxScen = fxScenarioRange(h);

      // The gross USD growth, then converted to HUF at scenario FX
      const grossValueUsd = amountHuf * Math.pow(1 + nominalReturnUsd, h); // in HUF-equivalent at today's FX
      const grossGainUsd = grossValueUsd - amountHuf;
      const taxRate = tbszTaxRate(h, inputs.existing_tbsz_open);
      const fee = amountHuf * 0.0035; // assumed Lightyear baseline

      // Three scenarios: HUF strengthens (FX low), constant (central), HUF weakens (high)
      const scenarioOutcome = (fxMult) => {
        const valueAtFx = (amountHuf * Math.pow(1 + nominalReturnUsd, h)) * fxMult;
        const gainAtFx = valueAtFx - amountHuf;
        const taxAtFx = Math.max(0, gainAtFx * taxRate);
        return valueAtFx - taxAtFx - fee;
      };

      const lowNet = scenarioOutcome(fxScen.low);
      const centralNet = scenarioOutcome(fxScen.central);
      const highNet = scenarioOutcome(fxScen.high);

      // Equity return uncertainty separately: ±2.5% around central
      const equityLowNet = (amountHuf * Math.pow(1.04, h)) * fxScen.central - Math.max(0, (amountHuf * Math.pow(1.04, h) - amountHuf) * taxRate) - fee;
      const equityHighNet = (amountHuf * Math.pow(1.09, h)) * fxScen.central - Math.max(0, (amountHuf * Math.pow(1.09, h) - amountHuf) * taxRate) - fee;

      // Combine the two sources of uncertainty for an overall range
      const combinedLow = Math.min(lowNet, equityLowNet);
      const combinedHigh = Math.max(highNet, equityHighNet);

      return {
        eligible: true,
        warning: warning,
        warning_hu: warning ? "3 évnél rövidebb tartás esetén a teljes 28% adó alkalmazandó" : null,
        warning_en: warning ? "Holding under 3 years incurs full 28% tax on gains" : null,
        netValue: centralNet,
        lowNet: combinedLow,
        highNet: combinedHigh,
        taxRate, tax: Math.max(0, grossGainUsd * taxRate),
        netReturnPct: centralNet / amountHuf - 1,
        annualizedReturn: Math.pow(centralNet / amountHuf, 1 / h) - 1,
        fxScenarios: {
          hufStrengthens: { fxMult: fxScen.low, value: lowNet, label_hu: "HUF erősödik (USD gyengül)", label_en: "HUF strengthens (USD weakens)" },
          fxConstant: { fxMult: fxScen.central, value: centralNet, label_hu: "FX állandó (központi eset)", label_en: "FX constant (central case)" },
          hufWeakens: { fxMult: fxScen.high, value: highNet, label_hu: "HUF gyengül (USD erősödik)", label_en: "HUF weakens (USD strengthens)" },
        },
        liquidity: taxRate === 0 ? 3 : 2,
        fxExposure: { huf: 0, eur: 0, usd: 100 },
        riskRating: 4,
        risks_hu: ["Részvénypiaci volatilitás (~15–18% éves)", `USD/HUF árfolyamkockázat (${h}y horizonton: ±${(fxScen.high - 1)*100|0}%)`, "TBSZ futamidő előtti kilépés adóhátrányt jelent"],
        risks_en: ["Equity volatility (~15-18% annual)", `USD/HUF FX risk (over ${h}y: ±${(fxScen.high - 1)*100|0}%)`, "Pre-maturity TBSZ exit incurs full tax"],
        assumptions_hu: `Várható USD-hozam: 6,5% (range 4-9%) | TER: 0,22% | TBSZ adósáv: ${(taxRate*100).toFixed(0)}% | Bróker díj: ~0,35% | FX-szcenáriók: ±${((fxScen.high - 1)*100).toFixed(0)}% a horizonton`,
        assumptions_en: `Expected USD return: 6.5% (range 4-9%) | TER: 0.22% | TBSZ bracket: ${(taxRate*100).toFixed(0)}% | Broker fee: ~0.35% | FX scenarios: ±${((fxScen.high - 1)*100).toFixed(0)}% over horizon`,
      };
    }

    case "tbsz_aggh": {
      const ineligible = inputs.tax_residency !== "HU";
      if (ineligible) return { eligible: false, reason_hu: "Nem magyar adóügyi illetőség", reason_en: "Non-HU tax residency" };

      const warning = h < 3;
      const nominalReturn = 0.029;
      const grossValue = amountHuf * Math.pow(1 + nominalReturn, h);
      const grossGain = grossValue - amountHuf;
      const taxRate = tbszTaxRate(h, inputs.existing_tbsz_open);
      const tax = Math.max(0, grossGain * taxRate);
      const fee = amountHuf * 0.0035;
      const netValue = grossValue - tax - fee;
      const lowGain = amountHuf * Math.pow(1 + 0.02, h) - amountHuf;
      const highGain = amountHuf * Math.pow(1 + 0.04, h) - amountHuf;
      const lowNet = amountHuf + lowGain * (1 - taxRate) - fee;
      const highNet = amountHuf + highGain * (1 - taxRate) - fee;

      return {
        eligible: true,
        warning,
        warning_hu: warning ? "3 évnél rövidebb tartás esetén a teljes 28% adó alkalmazandó" : null,
        warning_en: warning ? "Holding under 3 years incurs full 28% tax on gains" : null,
        netValue, lowNet, highNet,
        taxRate, tax,
        netReturnPct: netValue / amountHuf - 1,
        annualizedReturn: Math.pow(netValue / amountHuf, 1 / h) - 1,
        liquidity: taxRate === 0 ? 3 : 2,
        fxExposure: { huf: 0, eur: 100, usd: 0 },
        riskRating: 3,
        risks_hu: ["Kötvénypiaci volatilitás (~5–7% éves)", "Kamatkockázat kötvény-újraárazáskor", "EUR-hedge magasabb költségvonatkozással"],
        risks_en: ["Bond volatility (~5-7% annual)", "Rate risk on bond reset", "EUR-hedge carries cost"],
        assumptions_hu: `Várható éves hozam (EUR): 2,9% | TER: 0,10% | EUR-hedge: az alapok kockázat-mentesítve | Adósáv: ${(taxRate*100).toFixed(0)}%`,
        assumptions_en: `Expected return (EUR): 2.9% | TER: 0.10% | EUR-hedged: underlying FX-neutralized | Tax bracket: ${(taxRate*100).toFixed(0)}%`,
      };
    }

    case "nyesz": {
      if (!inputs.has_szja_payable) return { eligible: false, reason_hu: "Nincs fizetendő SZJA; a 20% visszatérítés nem érvényesíthető", reason_en: "No SZJA payable; 20% rebate cannot be claimed", remedyHint_hu: "Ha munkajövedelmed után fizetsz SZJA-t (15%), a NYESZ vonzóvá válik. KATA-soknak és átalányadósoknak csak korlátozottan.", remedyHint_en: "If you pay SZJA (15%) on employment income, NYESZ becomes attractive. Limited for KATA / flat-rate taxpayers." };
      if (h < 10) return {
        eligible: false,
        missedOpportunity: true,
        reason_hu: "NYESZ nyugdíjkorhatárig lekötve; a megadott időtáv túl rövid (10+ év szükséges)",
        reason_en: "NYESZ locks until retirement; specified horizon is too short (10+ years required)",
        remedyHint_hu: "Ha pénzügyi célod hosszabb távú nyugdíj-előtakarékosság (10+ év), a NYESZ jelentős opció, amit most kihagysz. 20% SZJA-visszatérítés évi max 100 000 Ft, ami 500 000 Ft éves befizetés mellett éri el a plafonját.",
        remedyHint_en: "If your goal is longer-term retirement savings (10+ years), NYESZ is a significant option you're currently missing. The 20% SZJA rebate is capped at 100,000 HUF/year, requiring 500,000 HUF/year deposit to reach the cap."
      };

      // NYESZ allocation model:
      // - The 20% rebate is capped at 100,000 Ft/year, requiring 500k Ft/year deposit
      // - User can deposit MORE than 500k/year but only 500k earns the rebate
      // - For lump-sum input: assume ALL deposited in year 1
      //   → only the first 500k earns 100k rebate
      //   → rest (overflow) compounds at NYESZ rate but without subsidy advantage
      // This is the efficiency-based capacity — NOT a hard limit
      const yearlyRebateThreshold = 500000;
      const yearlyMaxRebate = 100000;
      const allocatedToNyesz = Math.min(amountHuf, yearlyRebateThreshold);
      const overflow = amountHuf - allocatedToNyesz;

      // Smart overflow routing
      const overflowDest = (inputs._overflowDestinations && inputs._overflowDestinations.nyesz) || {
        moduleId: "tbsz_vwce", moduleName_hu: "TBSZ + VWCE", moduleName_en: "TBSZ + VWCE", annualRate: 0.0628
      };

      // NYESZ math: 20% rebate on the year-1 deposit (one-time, since lump sum), then compounding
      const rebate = Math.min(allocatedToNyesz * 0.20, yearlyMaxRebate);
      const effectiveCapital = allocatedToNyesz + rebate;
      const nominalReturn = 0.065; // equity-style portfolio inside NYESZ
      const nyeszValue = effectiveCapital * Math.pow(1 + nominalReturn, h);

      const overflowValue = overflow * Math.pow(1 + overflowDest.annualRate, h);
      const combinedNetValue = nyeszValue + overflowValue;
      const isSplit = overflow > 0;

      const allocationNote_hu = overflow > 0
        ? `NYESZ rebate-hatékony allokáció: ${fmtHufStatic(allocatedToNyesz)} (max 500 000 Ft, ami 100 000 Ft rebate-et hoz). A maradék ${fmtHufStatic(overflow)} a következő legjobb eszközbe: ${overflowDest.moduleName_hu}. MEGJEGYZÉS: Ha rendszeresen tudsz befizetni évente 500 000 Ft-ot a NYESZ-re, idővel a 100 000 Ft-os rebate minden évben jár — ez a lump-sum modell csak egyetlen 100 000 Ft-os rebate-et feltételez.`
        : `Teljes összeg hatékonyan NYESZ-be fér.`;
      const allocationNote_en = overflow > 0
        ? `NYESZ rebate-efficient allocation: ${fmtHufStatic(allocatedToNyesz)} (max 500,000 HUF, yielding 100,000 HUF rebate). Remaining ${fmtHufStatic(overflow)} routes to: ${overflowDest.moduleName_en}. NOTE: If you can deposit 500,000 HUF/year regularly, the 100,000 HUF rebate applies each year — this lump-sum model assumes only a single 100,000 HUF rebate in year 1.`
        : `Full amount fits efficiently into NYESZ.`;

      return {
        eligible: true,
        netValue: combinedNetValue,
        lowNet: combinedNetValue * 0.85,
        highNet: combinedNetValue * 1.15,
        taxRate: 0,
        tax: 0,
        netReturnPct: combinedNetValue / amountHuf - 1,
        annualizedReturn: Math.pow(combinedNetValue / amountHuf, 1 / h) - 1,
        rebate,
        allocation: { nyesz: allocatedToNyesz, overflow, overflowDestination: overflowDest.moduleId },
        splitBreakdown: isSplit ? {
          part1: { name_hu: "NYESZ-rész (20% SZJA-visszatérítéssel)", name_en: "NYESZ portion (with 20% SZJA rebate)", amount: allocatedToNyesz, value: nyeszValue, moduleId: "nyesz" },
          part2: { name_hu: `Maradék: ${overflowDest.moduleName_hu}`, name_en: `Overflow: ${overflowDest.moduleName_en}`, amount: overflow, value: overflowValue, moduleId: overflowDest.moduleId },
        } : null,
        allocationNote_hu, allocationNote_en,
        liquidity: 1,
        fxExposure: { huf: 50, eur: 0, usd: 50 },
        riskRating: 4,
        risks_hu: ["Nyugdíjkorhatár előtti kilépés esetén minden adóelőny elveszik + 20% büntetés", "Részvénypiaci volatilitás a NYESZ-portfólióban", "Lump-sum modell: csak egy 100 000 Ft-os rebate-et feltételez. Több éven át rendszeres befizetéssel a hozam jelentősen magasabb."],
        risks_en: ["Pre-retirement exit forfeits all tax benefits + 20% penalty", "Equity volatility in the NYESZ portfolio", "Lump-sum model: assumes only one 100,000 HUF rebate. Regular deposits over multiple years yield materially higher returns."],
        assumptions_hu: `Éves rebate-cap: 100 000 Ft (500 000 Ft éves befizetésnél) | Lump-sum modell: egyszer 100 000 Ft rebate | Várható hozam: 6,5% | Maradék: ${overflowDest.moduleName_hu}`,
        assumptions_en: `Annual rebate cap: 100,000 HUF (at 500,000 HUF/year deposit) | Lump-sum model: one 100,000 HUF rebate | Expected return: 6.5% | Overflow: ${overflowDest.moduleName_en}`,
      };
    }

    case "fixmap": {
      if (inputs.tax_residency !== "HU") return { eligible: false, reason_hu: "Nem magyar adóügyi illetőség", reason_en: "Non-HU tax residency" };
      const rate = MARKET_STATE.fixmapRate / 100;
      const compoundValue = amountHuf * Math.pow(1 + rate, h);
      const earlyExitPenalty = amountHuf * 0.01;

      return {
        eligible: true,
        netValue: compoundValue,
        lowNet: compoundValue,
        highNet: compoundValue,
        taxRate: 0,
        tax: 0,
        netReturnPct: compoundValue / amountHuf - 1,
        annualizedReturn: rate,
        liquidity: 4,
        fxExposure: { huf: 100, eur: 0, usd: 0 },
        riskRating: 1,
        risks_hu: [`Inflációs kockázat (ha KSH > ${MARKET_STATE.fixmapRate}%)`, "Korai kilépés 1% büntetés", "Reinvesztálási kockázat futamidő végén"],
        risks_en: [`Inflation risk (if KSH > ${MARKET_STATE.fixmapRate}%)`, "Early exit: 1% penalty", "Reinvestment risk at maturity"],
        assumptions_hu: `Kamat (lejáratig zárolt): ${MARKET_STATE.fixmapRate}% évente | Adó: 0% | Korai kilépés: 1% büntetés | Kamat újrabefektetése: igen`,
        assumptions_en: `Rate (locked to maturity): ${MARKET_STATE.fixmapRate}% annually | Tax: 0% | Early exit: 1% penalty | Coupon reinvested: yes`,
      };
    }

    case "pmap": {
      if (inputs.tax_residency !== "HU") return { eligible: false, reason_hu: "Nem magyar adóügyi illetőség", reason_en: "Non-HU tax residency" };
      // Year 1: previous year inflation + premium
      const year1Coupon = (MARKET_STATE.prevYearInflation + MARKET_STATE.pmpapPremium) / 100;
      // Years 2+: MNB forecast inflation + premium
      const forecastCoupon = (MARKET_STATE.mnbForecast2026 + MARKET_STATE.pmpapPremium) / 100;
      const earlyExitPenalty = 0.01;
      const isFractional = h < 1;

      let value;
      if (isFractional) {
        // Pro-rata coupon for partial year, minus 1% early exit penalty
        value = amountHuf * (1 + year1Coupon * h) * (1 - earlyExitPenalty);
      } else {
        value = amountHuf * (1 + year1Coupon);
        const fullYears = Math.floor(h);
        const partialYear = h - fullYears;
        for (let i = 2; i <= fullYears; i++) {
          value *= (1 + forecastCoupon);
        }
        if (partialYear > 0 && fullYears >= 1) {
          // Hold past full year: pro-rata for partial + early exit penalty
          value *= (1 + forecastCoupon * partialYear) * (1 - earlyExitPenalty);
        }
      }

      // Low/high scenarios — apply same rules with adjusted forecast
      const lowCoupon = (Math.max(MARKET_STATE.mnbForecast2026 - 1, 1) + MARKET_STATE.pmpapPremium) / 100;
      const highCoupon = (MARKET_STATE.mnbForecast2026 + 2 + MARKET_STATE.pmpapPremium) / 100;
      const computeScenario = (forecast2plus) => {
        if (isFractional) return amountHuf * (1 + year1Coupon * h) * (1 - earlyExitPenalty);
        let v = amountHuf * (1 + year1Coupon);
        const fy = Math.floor(h);
        const py = h - fy;
        for (let i = 2; i <= fy; i++) v *= (1 + forecast2plus);
        if (py > 0 && fy >= 1) v *= (1 + forecast2plus * py) * (1 - earlyExitPenalty);
        return v;
      };
      const lowVal = computeScenario(lowCoupon);
      const highVal = computeScenario(highCoupon);

      return {
        eligible: true,
        netValue: value,
        lowNet: lowVal,
        highNet: highVal,
        taxRate: 0,
        tax: 0,
        netReturnPct: value / amountHuf - 1,
        annualizedReturn: Math.pow(value / amountHuf, 1 / Math.max(h, 0.1)) - 1,
        warning: isFractional,

        fxExposure: { huf: 100, eur: 0, usd: 0 },
        riskRating: 1,
        risks_hu: ["Inflációs kockázat (negatív reálkamat tartomány)", "Elszalasztott opportunity-cost vs ÁKK", "Bankspecifikus kockázat (OBA-on felül)"],
        risks_en: ["Inflation risk (negative real rate territory)", "Opportunity cost vs ÁKK", "Bank-specific risk (above OBA)"],
        assumptions_hu: `Sztenderd (nem akciós) HUF betéti kamat: 2,0% | Adó: 28% | Cél: bemutatni az opportunity cost-ot a FixMÁP-hoz képest`,
        assumptions_en: `Standard (non-promotional) HUF deposit rate: 2.0% | Tax: 28% | Purpose: show opportunity cost vs FixMÁP`,
      };
    }

    default:
      return { eligible: false, reason_hu: "Ismeretlen modul", reason_en: "Unknown module" };
  }
}

// =========================================================================
// CASCADING ALLOCATION COMPOSER
//
// DESIGN DECISION (not a bug): This is a rule-based cascade, NOT a Markowitz-style
// risk-adjusted portfolio optimizer. The priority order is:
//   1. NYESZ (highest per-Ft government boost: 20% rebate, capped)
//   2. Babakötvény (next-highest: 10% subsidy, capped)
//   3. Best uncapped module for the remainder
//
// Why rule-based and not optimized:
// - The tool's "comparison, not advice" framing means it cannot make subjective
//   risk-utility trade-offs on the user's behalf.
// - Risk tolerance affects the NARROWING (which 3 options to highlight) not the
//   ALLOCATION (which buckets to fill first). The math is the math.
// - A truly optimized allocator would need a utility function (CRRA, Kelly, etc.)
//   which is portfolio theory the user hasn't asked for and which goes beyond
//   the tool's scope.
// - The cascade IS rationally ordered: fill highest-rebate-per-Ft buckets first,
//   then deploy the rest where uncapped yield is highest.
// =========================================================================
function buildOptimalAllocation(inputs, allModules) {
  let remaining = convertToHuf(inputs.amount, inputs.currency);
  const pockets = [];
  const h = inputs.horizon_years;

  // Pocket 1: NYESZ (if eligible and rebate-effective)
  if (remaining > 0 && inputs.has_szja_payable && h >= 10) {
    const nyeszModule = allModules.find(m => m.id === "nyesz");
    if (nyeszModule && nyeszModule.eligible) {
      const nyeszAlloc = Math.min(remaining, 500000); // single-year rebate cap
      const rebate = nyeszAlloc * 0.20;
      const nyeszValue = (nyeszAlloc + rebate) * Math.pow(1.065, h);
      pockets.push({
        moduleId: "nyesz",
        name_hu: "NYESZ (20% adóvisszatérítéssel)",
        name_en: "NYESZ (with 20% rebate)",
        amount: nyeszAlloc,
        value: nyeszValue,
        rate_label_hu: "20% rebate + 6,5% éves hozam",
        rate_label_en: "20% rebate + 6.5% annual return",
        color: "#8b3a3a",
      });
      remaining -= nyeszAlloc;
    }
  }

  // Pocket 2: Babakötvény (if eligible)
  if (remaining > 0 && inputs.has_child_under_18) {
    const babakotvenyModule = allModules.find(m => m.id === "babakotveny");
    if (babakotvenyModule && babakotvenyModule.eligible) {
      const yearsToEighteen = Math.min(h, 18);
      const totalCapacity = 120000 * Math.min(yearsToEighteen, 5);
      const effectiveCapacity = inputs.existing_babakotveny_open ? totalCapacity * 0.5 : totalCapacity;
      const babaAlloc = Math.min(remaining, effectiveCapacity);
      const subsidy = Math.min(babaAlloc * 0.10, 12000 * Math.min(yearsToEighteen, 5));
      const couponRate = (MARKET_STATE.prevYearInflation + MARKET_STATE.babakotvenyPremium) / 100;
      const babaValue = (babaAlloc + subsidy) * Math.pow(1 + couponRate, yearsToEighteen);
      pockets.push({
        moduleId: "babakotveny",
        name_hu: "Babakötvény (10% állami támogatás)",
        name_en: "Babakötvény (10% state subsidy)",
        amount: babaAlloc,
        value: babaValue,
        rate_label_hu: `${(couponRate * 100).toFixed(2)}% kamat + 10% támogatás`,
        rate_label_en: `${(couponRate * 100).toFixed(2)}% rate + 10% subsidy`,
        color: "#c98a4b",
      });
      remaining -= babaAlloc;
    }
  }

  // Pocket 3: Best uncapped module for the rest
  if (remaining > 0) {
    const eligibleUncapped = allModules.filter(m =>
      m.eligible && !m.penalty && m.id !== "wait" && m.id !== "nyesz" && m.id !== "babakotveny"
    );
    const best = eligibleUncapped.sort((a, b) => (b.annualizedReturn || 0) - (a.annualizedReturn || 0))[0];
    if (best) {
      const restValue = remaining * Math.pow(1 + (best.annualizedReturn || 0), h);
      pockets.push({
        moduleId: best.id,
        name_hu: best.name_hu,
        name_en: best.name_en,
        amount: remaining,
        value: restValue,
        rate_label_hu: `${((best.annualizedReturn || 0) * 100).toFixed(2)}% éves hozam`,
        rate_label_en: `${((best.annualizedReturn || 0) * 100).toFixed(2)}% annual return`,
        color: "#2d5a3d",
      });
    }
  }

  if (pockets.length === 0) return null;

  const totalAmount = pockets.reduce((s, p) => s + p.amount, 0);
  const totalValue = pockets.reduce((s, p) => s + p.value, 0);
  return {
    pockets,
    totalAmount,
    totalValue,
    annualizedReturn: Math.pow(totalValue / totalAmount, 1 / h) - 1,
    isMultiPocket: pockets.length > 1,
  };
}


// Pass 1: compute every module's standalone per-unit return (1M HUF baseline)
// Pass 2: for capped modules (Babakötvény, NYESZ), use Pass 1's top non-self module
//         as the overflow destination, then re-compute with smart routing.
// =========================================================================
function computeAllModules(inputs) {
  // Pass 1: standalone per-unit returns for all modules
  const allModuleIds = MODULES.map(m => m.id);
  const passOne = {};
  allModuleIds.forEach(id => {
    if (id === "babakotveny" || id === "nyesz") return; // skip self in pass 1
    const standalone = computeModuleStandalonePerUnitReturn(id, inputs);
    if (standalone > 0) {
      const meta = MODULES.find(m => m.id === id);
      passOne[id] = {
        moduleId: id,
        moduleName_hu: meta.name_hu,
        moduleName_en: meta.name_en,
        annualRate: standalone,
      };
    }
  });
  // Find best non-capped destination by annualized return
  const sorted = Object.values(passOne).sort((a, b) => b.annualRate - a.annualRate);
  const bestDest = sorted[0];

  // Pass 2: compute all modules using the bestDest for overflow routing
  const inputsWithOverflow = { ...inputs, _overflowDestinations: { babakotveny: bestDest, nyesz: bestDest } };
  const allModules = [...MODULES, ...PENALTY_MODULES];
  return allModules.map(m => {
    const calc = calculateModule(m.id, inputsWithOverflow);
    return { ...m, ...calc };
  });
}


// =========================================================================
// COMPARISON VIEW GENERATORS
// =========================================================================
function sortByReturn(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => b.netValue - a.netValue);
}
function sortByLiquidity(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => b.liquidity - a.liquidity);
}
function sortByTax(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => a.taxRate - b.taxRate);
}
function sortByRisk(results) {
  return [...results].filter(r => r.eligible && !r.penalty)
    .sort((a, b) => a.riskRating - b.riskRating);
}

// Narrowing logic (Section 11 step 7) — uses risk tolerance to reorder
function generateNarrowing(results, lang, inputs) {
  const eligible = results.filter(r => r.eligible && !r.penalty && r.id !== "wait");

  if (inputs.risk_tolerance === "conservative") {
    // Conservative: rank by low risk first, then by return within similar risk levels
    return [...eligible].sort((a, b) => {
      if (a.riskRating !== b.riskRating) return a.riskRating - b.riskRating;
      return b.netValue - a.netValue;
    }).slice(0, 3);
  }
  if (inputs.risk_tolerance === "growth") {
    // Growth: rank by return descending — same as default
    return [...eligible].sort((a, b) => b.netValue - a.netValue).slice(0, 3);
  }
  // Moderate: blended — heavy weight on return but penalize highest risk
  return [...eligible].sort((a, b) => {
    const aScore = (b.netValue || 0) - ((b.riskRating || 0) > 4 ? (b.netValue || 0) * 0.1 : 0);
    const bScore = (a.netValue || 0) - ((a.riskRating || 0) > 4 ? (a.netValue || 0) * 0.1 : 0);
    return aScore - bScore;
  }).slice(0, 3);
}

function runTestSuite() {
  const results = [];
  TEST_SUITE.forEach(test => {
    let status = "fail";
    let actual = null;
    let detail = "";
    try {
      if (test.module === "_sanity_all") {
        const allModuleIds = MODULES.map(m => m.id);
        const allReturns = allModuleIds
          .map(id => calculateModule(id, test.inputs))
          .filter(r => r.eligible && !r.penalty && r.annualizedReturn != null)
          .map(r => r.annualizedReturn);
        const maxRet = Math.max(...allReturns);
        actual = `max annualized return = ${(maxRet * 100).toFixed(2)}%`;
        status = maxRet <= test.expected.allReturnsBelow ? "pass" : "fail";
      } else if (test.module === "_sanity_compare") {
        const a = calculateModule(test.expected.aBeatsB.a, test.inputs);
        const b = calculateModule(test.expected.aBeatsB.b, test.inputs);
        actual = `${test.expected.aBeatsB.a}: ${a.netValue ? a.netValue.toFixed(0) : 'N/A'}, ${test.expected.aBeatsB.b}: ${b.netValue ? b.netValue.toFixed(0) : 'N/A'}`;
        status = (a.netValue || 0) > (b.netValue || 0) ? "pass" : "fail";
      } else {
        const result = calculateModule(test.module, test.inputs);
        actual = result;
        if (test.expected.eligible === false) {
          status = result.eligible === false ? "pass" : "fail";
          detail = result.eligible === false ? `(reason: ${result.reason_en})` : `(unexpectedly eligible)`;
        } else if (test.expected.eligible === true && test.expected.hasAllocationOverflow) {
          status = (result.eligible && result.allocation && result.allocation.overflow > 0) ? "pass" : "fail";
          detail = result.allocation ? `(overflow: ${result.allocation.overflow.toFixed(0)} HUF)` : "(no allocation field)";
        } else if (test.expected.eligible === true && Object.keys(test.expected).length === 1) {
          status = result.eligible ? "pass" : "fail";
        } else if (test.expected.taxRate !== undefined && test.expected.netValue === undefined) {
          // Tax-rate-only check
          status = result.eligible && Math.abs((result.taxRate || 0) - test.expected.taxRate) < 0.001 ? "pass" : "fail";
          detail = result.eligible ? `expected tax rate ${test.expected.taxRate}, got ${result.taxRate}` : `(not eligible: ${result.reason_en || 'unknown'})`;
        } else if (test.expected.netValue) {
          const diff = Math.abs(result.netValue - test.expected.netValue) / test.expected.netValue;
          status = diff <= test.expected.tolerance ? "pass" : "fail";
          detail = `expected ${test.expected.netValue.toFixed(0)}, got ${result.netValue ? result.netValue.toFixed(0) : 'N/A'} (diff: ${(diff * 100).toFixed(2)}%)`;
          if (test.expected.taxRate !== undefined && Math.abs(result.taxRate - test.expected.taxRate) > 0.001) {
            status = "fail";
            detail += ` | tax rate mismatch: expected ${test.expected.taxRate}, got ${result.taxRate}`;
          }
        }
      }
    } catch (e) {
      status = "fail";
      detail = `EXCEPTION: ${e.message}`;
    }
    results.push({ test, status, actual, detail });
  });
  return results;
}

  React.useEffect(() => {
    const fetchMnbFx = async () => {
      try {
        const url = 'https://www.mnb.hu/arfolyamok.asmx/GetCurrentExchangeRates';
        const resp = await fetch(url, { method: 'GET' });
        if (!resp.ok) return;
        const text = await resp.text();
        // Parse XML response (simplified - looking for EUR and USD rates)
        const eurMatch = text.match(/curr=["']EUR["'][^>]*>([0-9,\.]+)/);
        const usdMatch = text.match(/curr=["']USD["'][^>]*>([0-9,\.]+)/);
        if (eurMatch && usdMatch) {
          const eur = parseFloat(eurMatch[1].replace(',', '.'));
          const usd = parseFloat(usdMatch[1].replace(',', '.'));
          if (eur > 100 && eur < 600 && usd > 100 && usd < 600) {
            setMarketState(prev => ({ ...prev, fxHufEur: eur, fxHufUsd: usd, fxLastFetched: new Date().toISOString() }));
          }
        }
      } catch (e) {
        // Silently fall back to hardcoded
      }
    };
    fetchMnbFx();
